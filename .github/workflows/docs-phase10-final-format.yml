name: Documentation Phase 10 final formatter

on:
  push:
    branches:
      - agent/docs-phase-10-quality
    paths:
      - '.github/workflows/docs-phase10-final-format.yml'
      - 'scripts/check_docs_candidate_accessibility.py'
      - 'tests/docs/test_docs_guards_workflow.py'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-phase-10-quality
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Format final Phase 10 files
        run: |
          python -m pip install ruff
          ruff format \
            scripts/check_docs_candidate_accessibility.py \
            tests/docs/test_docs_guards_workflow.py
      - name: Commit formatting when needed
        run: |
          if git diff --quiet; then
            echo 'Final Phase 10 files are already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            scripts/check_docs_candidate_accessibility.py \
            tests/docs/test_docs_guards_workflow.py
          git commit -m 'style: format the final Phase 10 guard fixes'
          git push
