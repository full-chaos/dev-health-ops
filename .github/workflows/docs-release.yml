name: Publish Docs (Release)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Set up Node
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "22"

      - name: Run docs search acceptance
        run: |
          corepack enable
          pnpm --dir docs-qa install --frozen-lockfile
          pnpm --dir docs-qa run typecheck
          pnpm --dir docs-qa run test:search

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove legacy latest version
        run: |
          if mike list | awk '{print $1}' | grep -Fxq latest; then
            mike delete latest --push
          fi

      - name: Deploy versioned docs with Mike
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mike deploy --push --update-aliases "${VERSION}" latest
          mike set-default --push latest
