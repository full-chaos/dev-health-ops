name: Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'ci/**'
              - 'migrations/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'scripts/**'

  typecheck-mypy:
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mypy (type checking)
        continue-on-error: true
        run: |
          mypy --install-types --non-interactive .

  typecheck:
    name: typecheck
    if: always()
    needs: [typecheck-mypy]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate typecheck result
        env:
          TYPECHECK_RESULT: ${{ needs.typecheck-mypy.result }}
        run: |
          echo "typecheck-mypy result: ${TYPECHECK_RESULT}"
          case "${TYPECHECK_RESULT}" in
            success|skipped)
              echo "typecheck gate passed"
              ;;
            failure|cancelled|*)
              echo "typecheck gate failed"
              exit 1
              ;;
          esac
