name: Documentation inventory mypy report

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/docs-inventory-mypy-report.yml'
      - 'scripts/docs_inventory_review.py'
      - 'scripts/validate_docs_inventory_review.py'
  push:
    branches:
      - agent/docs-phase-1-inventory-disposition
    paths:
      - '.github/workflows/docs-inventory-mypy-report.yml'

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install type-check dependencies
        run: python -m pip install mypy types-PyYAML pydantic
      - name: Capture diagnostics
        run: |
          set +e
          mypy --no-pretty --show-error-codes \
            scripts/docs_inventory_review.py \
            scripts/validate_docs_inventory_review.py \
            > mypy-report.txt 2>&1
          cat mypy-report.txt
          exit 0
      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-inventory-mypy-report
          path: mypy-report.txt
          if-no-files-found: error
          retention-days: 1
