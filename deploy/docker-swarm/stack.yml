version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_LISTEN_HOST: "0.0.0.0"
      CLICKHOUSE_USER: ch
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_password
      CLICKHOUSE_DB: default
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    secrets:
      - clickhouse_password
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 2G
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.25"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dev-health-internal

  valkey:
    image: valkey/valkey:8-alpine
    command: >
      valkey-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - valkey_data:/data
    tmpfs:
      - /tmp
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: "0.2"
        reservations:
          memory: 64M
          cpus: "0.05"
      restart_policy:
        condition: on-failure
        delay: 5s
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev-health-internal

  # ===========================================================================
  # Database migrations (one-shot — CHAOS-2304)
  # ===========================================================================
  # Swarm has no depends_on/completion conditions: this service runs once
  # (restart_policy.condition: none) and operators MUST verify it completed
  # successfully before relying on the stack — see README.md:
  #   docker service logs dev-health_migrate
  # App services run with AUTO_RUN_MIGRATIONS=false and never ambient-migrate.
  #
  # POSTGRES_URI must point DIRECTLY at Postgres (port 5432), never at a
  # transaction-mode pooler (PgBouncer/RDS Proxy): migrations run raw DDL.
  # The Alembic step is skipped when POSTGRES_URI is unset (ClickHouse-only
  # stacks).
  migrate:
    image: ghcr.io/your-org/dev-health-ops:latest
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    entrypoint:
      - sh
      - -c
      - >-
        if [ -n "$$POSTGRES_URI" ]; then dev-hops migrate postgres; fi
        && dev-hops migrate clickhouse
    environment:
      POSTGRES_URI: ${POSTGRES_URI:-}
      CLICKHOUSE_URI: clickhouse://ch:ch@clickhouse:8123/default
      LOG_LEVEL: INFO
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: none
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - dev-health-internal

  api:
    image: ghcr.io/your-org/dev-health-ops:latest
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    environment:
      POSTGRES_URI: postgresql+asyncpg://devhealth:${POSTGRES_PASSWORD}@postgres:5432/devhealth
      DATABASE_URI: postgresql+asyncpg://devhealth:${POSTGRES_PASSWORD}@postgres:5432/devhealth
      CLICKHOUSE_URI: clickhouse://ch:ch@clickhouse:8123/default
      REDIS_URL: redis://valkey:6379/1
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      GRAPHQL_QUERY_TIMEOUT: "30"
      LOG_LEVEL: INFO
      # Schema is applied by the one-shot `migrate` service — the API must
      # never run migrations itself (CHAOS-2304).
      AUTO_RUN_MIGRATIONS: "false"
    secrets:
      - github_token
      - gitlab_token
      - jira_credentials
    ports:
      - "8000:8000"
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dev-health-api.rule=Host(`dev-health.example.com`)"
        - "traefik.http.services.dev-health-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dev-health-internal
      - dev-health-public

  # Worker topology split by latency class (CHAOS-2278); cost-class sub-queues
  # (CHAOS-2517) ride along: light/medium on `worker`, heavy on `worker-heavy`.
  worker: &worker-base
    image: ghcr.io/your-org/dev-health-ops:latest
    entrypoint:
      - celery
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - default,sync,sync.github,sync.gitlab,sync.linear,sync.jira,sync.launchdarkly,sync.github.light,sync.github.medium,sync.gitlab.light,sync.gitlab.medium,sync.jira.medium,sync.linear.medium,webhooks,reports,monitoring
      - --concurrency=4
    environment:
      POSTGRES_URI: postgresql+asyncpg://devhealth:${POSTGRES_PASSWORD}@postgres:5432/devhealth
      DATABASE_URI: postgresql+asyncpg://devhealth:${POSTGRES_PASSWORD}@postgres:5432/devhealth
      CLICKHOUSE_URI: clickhouse://ch:ch@clickhouse:8123/default
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      LOG_LEVEL: INFO
      # Schema is applied by the one-shot `migrate` service — workers must
      # never run migrations themselves (CHAOS-2304).
      AUTO_RUN_MIGRATIONS: "false"
    secrets:
      - github_token
      - gitlab_token
      - jira_credentials
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          memory: 2G
          cpus: "1"
        reservations:
          memory: 256M
          cpus: "0.1"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - dev-health-internal

  worker-ingest:
    <<: *worker-base
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - ingest
      - --concurrency=1

  worker-heavy:
    <<: *worker-base
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - metrics,backfill,monitoring,sync.github.heavy,sync.gitlab.heavy
      - --concurrency=2

volumes:
  clickhouse_data:
    driver: local
  valkey_data:
    driver: local

networks:
  dev-health-internal:
    driver: overlay
    internal: true
  dev-health-public:
    driver: overlay

secrets:
  clickhouse_password:
    external: true
  github_token:
    external: true
  gitlab_token:
    external: true
  jira_credentials:
    external: true
