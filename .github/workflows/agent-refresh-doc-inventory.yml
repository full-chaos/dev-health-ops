name: Agent refresh documentation inventory

on:
  push:
    branches:
      - agent/context-fabric-local-setup

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/context-fabric-local-setup
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - run: python -m pip install 'PyYAML>=6.0.3'
      - name: Regenerate and validate committed snapshots
        run: |
          mkdir -p .build
          python scripts/docs_inventory_review.py \
            --repository full-chaos/dev-health-ops \
            --output .build/documentation-inventory.json
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.validate_docs_inventory_review import _summary, _write_factual_tsv

          generated = Path('.build/documentation-inventory.json')
          factual = json.loads(generated.read_text(encoding='utf-8'))
          _write_factual_tsv(generated.with_suffix('.tsv'), factual['rows'])
          generated.with_name('documentation-inventory-summary.md').write_text(
              _summary(factual['rows']), encoding='utf-8'
          )
          PY
          cp .build/documentation-inventory.json \
            .github/documentation-program/inventory/documentation-inventory.json
          cp .build/documentation-inventory.tsv \
            .github/documentation-program/inventory/documentation-inventory.tsv
          cp .build/documentation-inventory-summary.md \
            .github/documentation-program/inventory/generated-summary.md
          python scripts/validate_docs_inventory_review.py \
            --generated-json .build/documentation-inventory.json \
            --inventory-dir .github/documentation-program/inventory \
            --ia-dir .github/documentation-program/ia
      - name: Commit deterministic snapshots
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/documentation-program/inventory/documentation-inventory.json \
            .github/documentation-program/inventory/documentation-inventory.tsv \
            .github/documentation-program/inventory/generated-summary.md
          git diff --cached --quiet && exit 0
          git commit -m 'Refresh documentation inventory snapshots'
          git push origin HEAD:agent/context-fabric-local-setup
