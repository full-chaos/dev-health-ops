name: Documentation v2 review build

on:
  pull_request:
    paths:
      - 'docs-prototype/**'
      - 'mkdocs.prototype.yml'
      - 'requirements-docs.txt'
      - 'scripts/validate_docs_v2_publication.py'
      - '.github/documentation-program/ia/**'
      - '.github/documentation-program/phase-9/**'
      - '.github/workflows/docs-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt
      - name: Validate publication inventory, IA placement, redirects and links
        run: |
          mkdir -p .build
          set -o pipefail
          python scripts/validate_docs_v2_publication.py \
            2>&1 | tee .build/docs-v2-validation.log
      - name: Build the v2 candidate
        run: |
          set -o pipefail
          mkdocs build --strict --config-file mkdocs.prototype.yml \
            2>&1 | tee .build/docs-v2-build.log
      - name: Upload the v2 review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-v2-review-evidence
          path: |
            .build/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
