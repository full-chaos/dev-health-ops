{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-health.fullname" . }}-valkey
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "valkey" "context" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dev-health.componentSelectorLabels" (dict "component" "valkey" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dev-health.componentSelectorLabels" (dict "component" "valkey" "context" $) | nindent 8 }}
    spec:
      containers:
        - name: valkey
          image: {{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}
          args:
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.valkey.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 3
          {{- if .Values.valkey.persistence.enabled }}
          volumeMounts:
            - name: valkey-data
              mountPath: /data
          {{- end }}
      {{- if .Values.valkey.persistence.enabled }}
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: {{ include "dev-health.fullname" . }}-valkey
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-health.fullname" . }}-valkey
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "valkey" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dev-health.componentSelectorLabels" (dict "component" "valkey" "context" $) | nindent 4 }}
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
{{- if .Values.valkey.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dev-health.fullname" . }}-valkey
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "valkey" "context" $) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.valkey.persistence.storageClass }}
  storageClassName: {{ .Values.valkey.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size }}
{{- end }}
{{- end }}
