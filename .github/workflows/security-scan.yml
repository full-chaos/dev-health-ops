name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install "pip-audit>=2.7.0"

      - name: Run pip-audit (fail on any vulnerability)
        run: |
          # Build ignore flags from repo-controlled allowlist (not user input)
          IGNORE_ARGS=""
          if [ -f .pip-audit-ignore ]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// }" ]] && continue
              CVE=$(echo "$line" | awk '{print $1}')
              IGNORE_ARGS="$IGNORE_ARGS --ignore-vuln $CVE"
            done < .pip-audit-ignore
          fi
          # shellcheck disable=SC2086
          pip-audit \
            --requirement requirements.txt \
            --vulnerability-service pypi \
            --format markdown \
            --output pip-audit-report.md \
            $IGNORE_ARGS

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: pip-audit-report.md
          if-no-files-found: ignore
          retention-days: 30

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep>=1.99.0"

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep.sarif

      - name: Drop nosemgrep-suppressed findings from the SARIF
        # Semgrep honors `# nosemgrep: <rule-id>` in its own reporting but
        # still emits the finding into SARIF with suppressions[inSource];
        # GitHub code scanning keeps those as OPEN alerts (verified: the
        # long-suppressed bcrypt/jwt lines in api/auth were open on PR
        # #1145). Strip ONLY results whose every suppression is an accepted
        # in-source one (adversarial-review: an external or
        # rejected/under-review suppression must NOT hide a finding), and if
        # the filter itself fails, upload the RAW SARIF rather than losing
        # scanner output.
        run: |
          if jq '.runs[].results |= map(select(
                   ((.suppressions // []) | length == 0)
                   or ((.suppressions // []) | any(
                        .kind != "inSource"
                        or ((.status // "accepted") != "accepted")
                      ))
                 ))' semgrep.sarif > semgrep.filtered.sarif \
             && jq -e '.runs' semgrep.filtered.sarif > /dev/null; then
            mv semgrep.filtered.sarif semgrep.sarif
          else
            echo "::warning::SARIF suppression filter failed; uploading unfiltered results"
          fi

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-results
          path: semgrep.sarif
          if-no-files-found: warn

      - name: Upload Semgrep SARIF to code scanning
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    # Gitleaks needs:
    #   - security-events: write — upload SARIF findings to code-scanning
    #   - pull-requests: write — post the scan summary comment on the PR
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
