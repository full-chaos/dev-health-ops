{{- /*
Latency-class worker pools (CHAOS-2278) + cost-class sub-queues (CHAOS-2517).
The default `worker` (worker-deployment.yaml) handles latency-sensitive queues
and light/medium cost-class sub-queues; these pools isolate blocking ingest and
heavy batch/heavy-sync work so they never starve user-facing tasks.
*/ -}}
{{- if .Values.workerIngest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-health.fullname" . }}-worker-ingest
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "worker-ingest" "context" $) | nindent 4 }}
spec:
  progressDeadlineSeconds: {{ .Values.workerIngest.progressDeadlineSeconds }}
  replicas: {{ .Values.workerIngest.replicas }}
  selector:
    matchLabels:
      {{- include "dev-health.componentSelectorLabels" (dict "component" "worker-ingest" "context" $) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "dev-health.componentSelectorLabels" (dict "component" "worker-ingest" "context" $) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.workerIngest.terminationGracePeriodSeconds }}
      {{- include "dev-health.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "dev-health.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: worker-ingest
          image: {{ include "dev-health.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - celery
            - -A
            - dev_health_ops.workers.celery_app
            - worker
            - --loglevel={{ .Values.workerIngest.logLevel }}
            - --disable-prefetch
            - -Q
            - {{ .Values.workerIngest.queues }}
            - --concurrency={{ .Values.workerIngest.concurrency }}
          envFrom:
            - configMapRef:
                name: {{ include "dev-health.configMapName" . }}
            - secretRef:
                name: {{ include "dev-health.secretName" . }}
          {{- with .Values.worker.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.workerIngest.resources | nindent 12 }}
      {{- with .Values.workerIngest.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerIngest.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerIngest.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
