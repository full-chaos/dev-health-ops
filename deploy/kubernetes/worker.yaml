---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-health-worker
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: dev-health-ops
spec:
  progressDeadlineSeconds: 7600
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-health-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-health-worker
    spec:
      terminationGracePeriodSeconds: 3700
      securityContext:
        runAsNonRoot: true
      # CHAOS-2304 safety net: see api.yaml — blocks worker start until all
      # ClickHouse migrations are applied. Read-only `status --check` loop,
      # no DDL; the migrate Job is the only migration runner.
      initContainers:
        - name: wait-for-migrations
          image: ghcr.io/your-org/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              attempts=0
              until dev-hops migrate clickhouse status --check; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge 60 ]; then
                  echo "ClickHouse migrations still pending after $attempts checks; exiting for restart backoff" >&2
                  exit 1
                fi
                echo "ClickHouse migrations pending; re-checking in 5s (attempt $attempts/60)"
                sleep 5
              done
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      containers:
        - name: worker
          image: ghcr.io/your-org/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - celery
            - -A
            - dev_health_ops.workers.celery_app
            - worker
            - --loglevel=info
            - --disable-prefetch
            - -Q
            - default,sync,sync.github,sync.gitlab,sync.linear,sync.jira,sync.launchdarkly,sync.github.light,sync.github.medium,sync.gitlab.light,sync.gitlab.medium,sync.jira.medium,sync.linear.medium,webhooks,reports,monitoring
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # Workers don't need HTTP probes, use exec probes
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - dev_health_ops.workers.celery_app
                - inspect
                - ping
                - --timeout
                - "10"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
---
# Horizontal Pod Autoscaler for Workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dev-health-worker-hpa
  namespace: dev-health
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dev-health-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Ingest worker (CHAOS-2278): isolated single slot for blocking stream
# consumers so they never starve the default fleet. Fixed-replica (no HPA).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-health-worker-ingest
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health-worker-ingest
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: dev-health-ops
spec:
  progressDeadlineSeconds: 7600
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-health-worker-ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-health-worker-ingest
    spec:
      terminationGracePeriodSeconds: 3700
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: wait-for-migrations
          image: ghcr.io/your-org/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              attempts=0
              until dev-hops migrate clickhouse status --check; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge 60 ]; then
                  echo "ClickHouse migrations still pending after $attempts checks; exiting for restart backoff" >&2
                  exit 1
                fi
                echo "ClickHouse migrations pending; re-checking in 5s (attempt $attempts/60)"
                sleep 5
              done
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
      containers:
        - name: worker-ingest
          image: ghcr.io/your-org/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - celery
            - -A
            - dev_health_ops.workers.celery_app
            - worker
            - --loglevel=info
            - --disable-prefetch
            - -Q
            - ingest
            - --concurrency
            - "1"
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - dev_health_ops.workers.celery_app
                - inspect
                - ping
                - --timeout
                - "10"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
---
# Heavy worker (CHAOS-2278): batch compute (metrics, backfill) + heavy
# cost-class sync sub-queues (CHAOS-2517) isolated from latency-sensitive work.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-health-worker-heavy
  namespace: dev-health
