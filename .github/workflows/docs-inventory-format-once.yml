name: Format documentation inventory scripts once

on:
  push:
    branches:
      - agent/docs-phase-1-inventory-disposition
    paths:
      - '.github/workflows/docs-inventory-format-once.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-phase-1-inventory-disposition

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Format the inventory scripts
        run: |
          python -m pip install ruff
          ruff format scripts/docs_inventory_review.py scripts/validate_docs_inventory_review.py
          rm .github/workflows/docs-inventory-format-once.yml

      - name: Commit formatting and remove the one-time workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/docs_inventory_review.py scripts/validate_docs_inventory_review.py
          git add -A .github/workflows/docs-inventory-format-once.yml
          git commit -m 'style: format the documentation inventory scripts'
          git push
