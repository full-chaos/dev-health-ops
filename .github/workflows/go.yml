name: Go

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'tests/compatibility/river/**'
      - 'docs/architecture/evidence/go-worker-migration/**'
      - 'ci/check_go.sh'
      - 'ci/check_river_compat_static.sh'
      - 'ci/local_validate.sh'
      - 'Makefile'
      - '.github/workflows/go.yml'
  pull_request:
    branches: ['**']
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'go.work'
      - 'go.work.sum'
      - 'tests/compatibility/river/**'
      - 'docs/architecture/evidence/go-worker-migration/**'
      - 'ci/check_go.sh'
      - 'ci/check_river_compat_static.sh'
      - 'ci/local_validate.sh'
      - 'Makefile'
      - '.github/workflows/go.yml'
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: '**/go.sum'

      - name: Run Go quality gate
        run: bash ci/check_go.sh all

      - name: Validate River compatibility harness
        run: bash ci/check_river_compat_static.sh

  river-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: '**/go.sum'

      - name: Set up Python 3.13.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13.14'

      - name: Install pinned Python compatibility dependencies
        run: >-
          python -m pip install
          asyncpg==0.31.0
          riverqueue==0.7.0
          SQLAlchemy==2.0.49

      - name: Run live River compatibility matrix
        env:
          RIVER_COMPAT_PYTHON: python
        run: |
          tests/compatibility/river/run.sh > "${RUNNER_TEMP}/river-compatibility.json"
          jq -e '
            .status == "complete_with_architecture_blocker"
            and .nested_n_minus_1.status == "pass"
            and (.profiles | length) == 2
          ' "${RUNNER_TEMP}/river-compatibility.json" >/dev/null

      - name: Upload sanitized compatibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: river-compatibility-${{ github.sha }}
          path: ${{ runner.temp }}/river-compatibility.json
          if-no-files-found: ignore
          retention-days: 14
