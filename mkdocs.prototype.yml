extra_css:
  - stylesheets/extra.css
  - stylesheets/home.css
  - stylesheets/home-sections.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
