{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-health.fullname" . }}-web
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "web" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dev-health.componentSelectorLabels" (dict "component" "web" "context" $) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
{{- end }}
