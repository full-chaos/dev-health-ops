[build-system]
requires = ["setuptools>=68", "wheel", "setuptools_scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "dev-health-ops"
dynamic = ["version"]
description = "Open Source Development Team Operation Analytics"
readme = "README.md"
authors = [{ name = "Chris Geo", email = "chris@example.com" }]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
keywords = ["metrics", "git", "analytics", "developer-experience", "grafana"]
requires-python = ">=3.10"
dependencies = [
  "tqdm",
  "sqlalchemy",
  "clickhouse-connect",
  "fastapi",
  "slowapi",
  "httpx",
  "psycopg2-binary",
  "asyncpg",
  "aiosqlite",
  "python-gitlab",
  "GitPython",
  "PyGithub>=2.1.0,<3.0.0",
  "requests",
  "pydantic>=2.7.0",
  "PyYAML",
  "typing_extensions",
  "jira",
  "alembic",
  "motor",
  "uvicorn",
  "radon",
  "openai",
  "anthropic",
  "strawberry-graphql[fastapi]",
  "celery[redis]>=5.3.0",
  "croniter>=1.3.0",
  "redis>=5.0.0",
  # Shared Atlassian client library (Jira REST/GraphQL)
  "atlassian-gen-client>=0.1.0b3",
  "pytest-xdist (>=3.8.0,<4.0.0)",
  # Authentication
  "PyJWT>=2.8.0",
  "bcrypt>=4.0.0",
  "email-validator>=2.0.0",
  "PyNaCl>=1.5.0",
  "stripe>=7.0.0",
  "resend>=2.5.0",
]

[project.optional-dependencies]
dev = [
  "mypy",
  "ruff>=0.4.0",
  "pytest",
  "pytest-asyncio",
  "pytest-cov",
]
enterprise-sso = [
  "defusedxml>=0.7.0",
  "signxml>=3.0.0",
]

[project.urls]
Repository = "https://github.com/chrisgeo/dev-health-ops"
Issues = "https://github.com/chrisgeo/dev-health-ops/issues"

[tool.setuptools_scm]
version_scheme = "post-release"
local_scheme = "dirty-tag"

[tool.setuptools]
package-dir = { "" = "src" }
packages = { find = { where = [
  "src",
], exclude = [
  "tests*",
  "docs*",
  "examples*",
  "data*",
  "grafana*",
  "docker*",
  "dist*",
  "build*",
] } }
py-modules = ["cli", "investment_taxonomy", "storage", "utils"]
include-package-data = true

[tool.setuptools.package-data]
"*" = ["**/*.sql", "**/*.yaml", "**/*.yml", "**/*.json", "**/*.mako"]

[tool.ruff]
target-version = "py310"
line-length = 88
src = ["src", "tests"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
  "SIM108", # use ternary operator (readability trade-off)
]

[tool.ruff.lint.isort]
known-first-party = ["dev_health_ops"]

[tool.poetry]
name = "dev-health-ops"
version = "0.1.0"
description = "Open Source Development Team Operation Analytics"
authors = ["Chris Geo <chris@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "dev_health_ops", from = "src" }]
include = [
  "src/dev_health_ops/config/**/*",
  "src/dev_health_ops/alembic.ini",
  "src/dev_health_ops/alembic/**/*",
]

[tool.poetry.dependencies]
python = "^3.10"
tqdm = "*"
sqlalchemy = "*"
clickhouse-connect = "*"
fastapi = "*"
slowapi = "*"
httpx = "*"
psycopg2-binary = "*"
asyncpg = "*"
aiosqlite = "*"
python-gitlab = "*"
GitPython = "*"
PyGithub = ">=2.1.0,<3.0.0"
requests = "*"
pydantic = ">=2.7.0"
PyYAML = "*"
typing_extensions = "*"
jira = "*"
alembic = "*"
motor = "*"
uvicorn = "*"
radon = "*"
openai = "*"
anthropic = "*"
strawberry-graphql = { extras = ["fastapi"], version = "*" }
celery = { extras = ["redis"], version = ">=5.3.0" }
croniter = ">=1.3.0"
redis = ">=5.0.0"
atlassian-gen-client = ">=0.1.0b3"
PyNaCl = ">=1.5.0"
stripe = ">=7.0.0"
resend = ">=2.5.0"

[[tool.poetry.source]]
name = "github"
url = "https://pypi.pkg.github.com/full-chaos"
priority = "supplemental"

[tool.poetry.group.dev.dependencies]
mypy = "*"
ruff = ">=0.4.0"
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
fakeredis = "*"

[tool.poetry.group.enterprise-sso]
optional = true

[tool.poetry.group.enterprise-sso.dependencies]
defusedxml = ">=0.7.0"
signxml = ">=3.0.0"

[tool.poetry.scripts]
dev-health-ops = "dev_health_ops.cli:main"
dev-hops = "dev_health_ops.cli:main"

[project.scripts]
dev-health-ops = "dev_health_ops.cli:main"
dev-hops = "dev_health_ops.cli:main"
