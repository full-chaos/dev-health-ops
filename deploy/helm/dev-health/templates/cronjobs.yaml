{{- range $name, $job := .Values.cronjobs }}
{{- if $job.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "dev-health.fullname" $ }}-{{ $name | kebabcase }}
  namespace: {{ include "dev-health.namespace" $ }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "cronjob" "context" $) | nindent 4 }}
    app.kubernetes.io/cronjob: {{ $name | kebabcase }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: {{ $job.backoffLimit | default 3 }}
      activeDeadlineSeconds: {{ $job.activeDeadlineSeconds | default 3600 }}
      template:
        spec:
          {{- include "dev-health.imagePullSecrets" $ | nindent 10 }}
          serviceAccountName: {{ include "dev-health.serviceAccountName" $ }}
          restartPolicy: OnFailure
          containers:
            - name: {{ $name | kebabcase }}
              image: {{ include "dev-health.image" $ }}
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command:
                {{- toYaml $job.command | nindent 16 }}
              envFrom:
                - configMapRef:
                    name: {{ include "dev-health.configMapName" $ }}
                - secretRef:
                    name: {{ include "dev-health.secretName" $ }}
              resources:
                {{- toYaml $job.resources | nindent 16 }}
{{- end }}
{{- end }}
