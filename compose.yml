name: dev-health

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  signoz_data:
    driver: local
  glitchtip_db_data:
    driver: local

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PG_DATA: /var/lib/postgresql/
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: on-failure
    environment:
      CLICKHOUSE_LISTEN_HOST: 0.0.0.0
      CLICKHOUSE_USER: ch
      CLICKHOUSE_PASSWORD: ch
      CLICKHOUSE_DB: default
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: api
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0
    container_name: dev-health-api
    command: |
      --host 0.0.0.0 --port 8000 --reload
    environment: &env
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_DEV_HEALTH_OPS: "0.0.0"
      # GraphQL analytics endpoint available at /graphql
      GRAPHQL_QUERY_TIMEOUT: "30"
      DATABASE_URI: "postgresql+asyncpg://postgres:postgres@postgres:5432/postgres"
      CLICKHOUSE_URI: "clickhouse://ch:ch@clickhouse:8123/default"
      REDIS_URL: "redis://redis:6379/1"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_TEAM: ${STRIPE_PRICE_ID_TEAM:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}
      LICENSE_PRIVATE_KEY: ${LICENSE_PRIVATE_KEY:-}
      # Email (Resend)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    working_dir: /app
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/ready" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  billing-edge:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: api
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0
    container_name: dev-health-billing-edge
    entrypoint:
      - python
      - -m
      - uvicorn
    command:
      - dev_health_ops.api.billing_edge:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      <<: *env
      POSTGRES_URI: "postgresql+asyncpg://postgres:postgres@postgres:5432/postgres"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      - ./:/app
    working_dir: /app
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/ready" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: runner
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0
    container_name: worker
    command: celery -A workers.celery_app worker --loglevel=info -Q default,metrics,sync,webhooks
    environment:
      <<: *env
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Email (Resend) — worker sends billing emails via Celery task
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@example.com}
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app

  # ---------------------------------------------------------------------------
  # Observability — SigNoz (distributed tracing + metrics)
  # ---------------------------------------------------------------------------
  # Single-binary all-in-one deployment.
  # UI:         http://localhost:8080
  # OTLP gRPC:  localhost:4317  (matches OTEL_EXPORTER_OTLP_ENDPOINT default)
  # OTLP HTTP:  localhost:4318
  # ---------------------------------------------------------------------------
  signoz:
    image: signoz/signoz:latest
    container_name: signoz
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - signoz_data:/var/lib/signoz
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Observability — GlitchTip (error tracking / Sentry-compatible)
  # ---------------------------------------------------------------------------
  # Web UI + API: http://localhost:8800
  # Set SENTRY_DSN to a project DSN from the GlitchTip UI to enable error
  # reporting from dev-health-ops (glitchtip accepts the Sentry SDK protocol).
  # ---------------------------------------------------------------------------
  glitchtip-db:
    image: postgres:16-alpine
    container_name: glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U glitchtip" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip"
      REDIS_URL: "redis://redis:6379/2"
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?GLITCHTIP_SECRET_KEY must be set}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8800}
      EMAIL_URL: ${EMAIL_URL:-consolemail://}
      DEFAULT_FROM_EMAIL: ${EMAIL_FROM_ADDRESS:-noreply@example.com}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8800:8000"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
