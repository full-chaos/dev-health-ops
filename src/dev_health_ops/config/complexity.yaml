# Keep include_globs aligned with LANGUAGE_BY_EXTENSION in
# analytics/complexity.py. These globs also gate provider file-content
# ingestion (_fetch_scannable_contents), so a language missing here never
# gets git_files.contents and can never produce complexity data.
# fnmatch '*' crosses '/' so "*.py" matches root-level and nested paths.
include_globs:
  - "*.py"
  - "*.ts"
  - "*.tsx"
  - "*.js"
  - "*.jsx"
  - "*.mjs"
  - "*.cjs"
  - "*.go"
  - "*.rs"
  - "*.java"
  - "*.kt"
  - "*.kts"
  - "*.rb"
  - "*.php"
  - "*.c"
  - "*.h"
  - "*.cpp"
  - "*.cc"
  - "*.hpp"
  - "*.cs"
  - "*.swift"
  - "*.scala"
  - "*.m"
  - "*.mm"
  - "*.lua"
  - "*.vue"
exclude_globs:
  - "**/migrations/**"
  - "migrations/**"
  - "**/tests/**"
  - "tests/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/__init__.py"
  - "__init__.py"
  - "**/node_modules/**"
  - "node_modules/**"
  - "**/dist/**"
  - "dist/**"
  - "**/build/**"
  - "build/**"
  - "**/.next/**"
  - ".next/**"
  - "**/vendor/**"
  - "vendor/**"
  - "*.min.js"
  - "*.d.ts"
  - "*.config.js"
  - "*.config.ts"
  - "*.config.mjs"
high_complexity_threshold: 15
very_high_threshold: 25
