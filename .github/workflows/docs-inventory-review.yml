name: Documentation inventory review

on:
  push:
    branches:
      - agent/docs-phase-1-inventory-disposition
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install inventory dependency
        run: python -m pip install 'PyYAML>=6.0.3'

      - name: Regenerate factual inventory and review formats
        run: |
          mkdir -p .build
          python scripts/docs_inventory_review.py \
            --repository full-chaos/dev-health-ops \
            --output .build/documentation-inventory.json
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.validate_docs_inventory_review import _summary, _write_factual_tsv

          build = Path('.build')
          rows = json.loads(
              (build / 'documentation-inventory.json').read_text(encoding='utf-8')
          )['rows']
          _write_factual_tsv(build / 'documentation-inventory.tsv', rows)
          (build / 'documentation-inventory-summary.md').write_text(
              _summary(rows), encoding='utf-8'
          )
          PY
          cp .build/documentation-inventory.json \
            .github/documentation-program/inventory/documentation-inventory.json
          cp .build/documentation-inventory.tsv \
            .github/documentation-program/inventory/documentation-inventory.tsv
          cp .build/documentation-inventory-summary.md \
            .github/documentation-program/inventory/generated-summary.md

      - name: Commit refreshed factual snapshot
        if: github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/documentation-program/inventory/documentation-inventory.json
          git add .github/documentation-program/inventory/documentation-inventory.tsv
          git add .github/documentation-program/inventory/generated-summary.md
          if git diff --cached --quiet; then
            echo 'Factual inventory snapshot is current.'
          else
            git commit -m 'docs: refresh the final factual inventory snapshot'
            git push
          fi

      - name: Validate factual snapshot and reviewed disposition
        run: |
          python scripts/validate_docs_inventory_review.py \
            --generated-json .build/documentation-inventory.json \
            --inventory-dir .github/documentation-program/inventory \
            --ia-dir .github/documentation-program/ia

      - name: Upload inventory review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-inventory-review
          path: |
            .build/**
            .github/documentation-program/inventory/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
