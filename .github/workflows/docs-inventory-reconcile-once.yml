name: Reconcile documentation inventory once

on:
  push:
    branches:
      - agent/docs-phase-1-inventory-disposition
    paths:
      - 'scripts/reconcile_docs_inventory_once.py'
      - '.github/workflows/docs-inventory-reconcile-once.yml'

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-phase-1-inventory-disposition

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install inventory dependency
        run: python -m pip install 'PyYAML>=6.0.3'

      - name: Reconcile the current source tree with the reviewed disposition
        run: |
          cp scripts/reconcile_docs_inventory_once.py /tmp/reconcile_docs_inventory_once.py
          rm scripts/reconcile_docs_inventory_once.py
          rm .github/workflows/docs-inventory-reconcile-once.yml
          mkdir -p .build
          python scripts/docs_inventory_review.py \
            --repository full-chaos/dev-health-ops \
            --output .build/documentation-inventory.json
          PYTHONPATH=scripts python /tmp/reconcile_docs_inventory_once.py

      - name: Commit the reconciled inventory and remove the one-time helper
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A .github/documentation-program/inventory
          git add -A scripts/reconcile_docs_inventory_once.py
          git add -A .github/workflows/docs-inventory-reconcile-once.yml
          git commit -m 'docs: reconcile the inventory with the current source tree'
          git push
