{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-health.fullname" . }}-web
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "web" "context" $) | nindent 4 }}
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dev-health.componentSelectorLabels" (dict "component" "web" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dev-health.componentSelectorLabels" (dict "component" "web" "context" $) | nindent 8 }}
    spec:
      {{- include "dev-health.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "dev-health.serviceAccountName" . }}
      containers:
        - name: web
          image: {{ include "dev-health.webImage" . }}
          imagePullPolicy: {{ .Values.webImage.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "::"
            - name: BACKEND_URL
              value: {{ default (printf "http://%s-api:%d" (include "dev-health.fullname" .) (.Values.api.port | int)) .Values.web.env.BACKEND_URL | quote }}
            - name: AUTH_SECRET
              {{- if .Values.web.env.AUTH_SECRET }}
              value: {{ .Values.web.env.AUTH_SECRET | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "dev-health.secretName" . }}
                  key: JWT_SECRET_KEY
                  optional: true
              {{- end }}
            - name: NODE_ENV
              value: {{ .Values.web.env.NODE_ENV | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ include "dev-health.redisURL" . | quote }}
            {{- end }}
          {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
