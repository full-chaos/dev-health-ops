---
# Requires a Prometheus Adapter mapping these metric names. All three signals
# must be present: depth asks for capacity, oldest-age protects latency, and
# execution saturation prevents a replica count from hiding a busy process.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: dev-health-go-worker-heavy, namespace: dev-health}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: dev-health-go-worker-heavy}
  minReplicas: 0
  maxReplicas: 1
  metrics:
    - type: External
      external: {metric: {name: worker_jobs_available, selector: {matchLabels: {profile: heavy}}}, target: {type: AverageValue, averageValue: "1"}}
    - type: External
      external: {metric: {name: worker_job_oldest_age_seconds, selector: {matchLabels: {profile: heavy}}}, target: {type: AverageValue, averageValue: "60"}}
    - type: External
      external: {metric: {name: worker_execution_saturation_ratio, selector: {matchLabels: {profile: heavy}}}, target: {type: AverageValue, averageValue: "800m"}}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: dev-health-go-worker-sync-provider, namespace: dev-health}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: dev-health-go-worker-sync-provider}
  minReplicas: 0
  maxReplicas: 2
  metrics:
    - type: External
      external: {metric: {name: worker_jobs_available, selector: {matchLabels: {profile: sync, queue: sync_provider}}}, target: {type: AverageValue, averageValue: "1"}}
    - type: External
      external: {metric: {name: worker_job_oldest_age_seconds, selector: {matchLabels: {profile: sync, queue: sync_provider}}}, target: {type: AverageValue, averageValue: "60"}}
    - type: External
      external: {metric: {name: worker_execution_saturation_ratio, selector: {matchLabels: {profile: sync}}}, target: {type: AverageValue, averageValue: "800m"}}
