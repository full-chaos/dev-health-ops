name: Docs Guards

on:
  pull_request:
    branches: ['**']
    paths:
      - '.github/workflows/docs-guards.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-canonical-docs-finalization:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.head_ref == 'agent/docs-content-style-remediation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the documentation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-content-style-remediation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Apply the final canonical documentation cleanup
        id: finalize
        continue-on-error: true
        run: python scripts/pr1256_finalize_docs.py

      - name: Remove one-time helper files
        if: always()
        run: |
          rm -f \
            scripts/pr1256_finalize_docs.py \
            .github/workflows/pr1256-docs-finalize.yml \
            .github/documentation-program/content/pr-1256-migration-trigger.txt

      - name: Commit and push the applied state
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalization changes to commit.'
          else
            git commit -m 'docs: apply canonical migration cleanup'
            git push origin HEAD:agent/docs-content-style-remediation
          fi

      - name: Record finalizer outcome
        if: always()
        run: echo "finalizer outcome: ${{ steps.finalize.outcome }}"
