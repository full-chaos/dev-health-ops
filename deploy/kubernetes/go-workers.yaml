# Additive, default-off Go/River workloads. This file is deliberately absent
# from kustomization.yaml: apply it only after the migration Job is complete.
# The checked-in route contract is still Celery-owned; these pods expose
# /healthz, /readyz, and /metrics for a bounded coexistence canary.
apiVersion: v1
kind: Service
metadata:
  name: dev-health-go-workers
  namespace: dev-health
  labels: {app.kubernetes.io/component: go-worker}
spec:
  selector: {app.kubernetes.io/component: go-worker}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-health-go-worker-heavy
  namespace: dev-health
  labels: {app.kubernetes.io/component: go-worker, dev-health.io/profile: heavy}
spec:
  replicas: 0
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
  selector: {matchLabels: {app.kubernetes.io/component: go-worker, dev-health.io/profile: heavy}}
  template:
    metadata: {labels: {app.kubernetes.io/component: go-worker, dev-health.io/profile: heavy}}
    spec:
      terminationGracePeriodSeconds: 120
      securityContext: {runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: worker
          image: ghcr.io/full-chaos/dev-health-go-worker:latest
          env: [{name: DEV_HEALTH_PROFILE, value: heavy}, {name: DEV_HEALTH_HTTP_ADDR, value: ":8080"}]
          envFrom: [{configMapRef: {name: dev-health-config}}, {secretRef: {name: dev-health-secrets}}]
          ports: [{name: metrics, containerPort: 8080}]
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
          livenessProbe: {httpGet: {path: /healthz, port: metrics}, initialDelaySeconds: 10, periodSeconds: 15}
          readinessProbe: {httpGet: {path: /readyz, port: metrics}, initialDelaySeconds: 10, periodSeconds: 10}
---
