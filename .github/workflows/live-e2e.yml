name: Live Backend E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]
  merge_group:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        # Always run on workflow_dispatch
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'ci/**'
              - 'migrations/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'pytest.ini'
              - 'alembic.ini'
              - 'Makefile'
              - 'scripts/**'

  live-e2e:
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:17.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:25.1
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: ch
          CLICKHOUSE_PASSWORD: ch
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --user ch --password ch --query 'SELECT 1'" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live-e2e tier
        env:
          DISABLE_DOTENV: "1"
          DATABASE_URI: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          CLICKHOUSE_URI: clickhouse://ch:ch@localhost:8123/default
          POSTGRES_URI: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          LIVE_E2E_FIXTURE_SEED: "20260219"
          LIVE_E2E_API_LOG_FILE: ./live-e2e-api.log
        run: |
          chmod +x ci/run_tests.sh ci/run_live_backend_e2e.sh
          ./ci/run_tests.sh live-e2e

      - name: Upload live-e2e API logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-e2e-api-logs
          path: live-e2e-api.log
          if-no-files-found: ignore
