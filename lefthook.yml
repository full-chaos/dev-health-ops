pre-push:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: ruff format {push_files}
      stage_fixed: true
    ruff-fix:
      glob: "*.py"
      run: ruff check --fix {push_files}
      stage_fixed: true
    ruff-format-check:
      glob: "*.py"
      run: ruff format --check {push_files}
    ruff-check:
      glob: "*.py"
      run: ruff check {push_files}
