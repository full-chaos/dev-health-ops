name: Documentation Phase 10 lint fixer

on:
  push:
    branches:
      - agent/docs-phase-10-quality
    paths:
      - '.github/workflows/docs-phase10-lint-fix.yml'
      - 'scripts/check_docs_candidate_search.py'
      - 'scripts/check_docs_candidate_accessibility.py'
      - 'scripts/check_docs_candidate_facts.py'
      - 'tests/docs/test_docs_guards_workflow.py'
      - 'tests/docs/test_design_tokens.py'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-phase-10-quality
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Apply Ruff fixes and formatting
        run: |
          python -m pip install ruff
          ruff check --fix \
            scripts/check_docs_candidate_search.py \
            scripts/check_docs_candidate_accessibility.py \
            scripts/check_docs_candidate_facts.py \
            tests/docs/test_docs_guards_workflow.py \
            tests/docs/test_design_tokens.py
          ruff format \
            scripts/check_docs_candidate_search.py \
            scripts/check_docs_candidate_accessibility.py \
            scripts/check_docs_candidate_facts.py \
            tests/docs/test_docs_guards_workflow.py \
            tests/docs/test_design_tokens.py
      - name: Commit changes when needed
        run: |
          if git diff --quiet; then
            echo 'Phase 10 files already pass Ruff.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            scripts/check_docs_candidate_search.py \
            scripts/check_docs_candidate_accessibility.py \
            scripts/check_docs_candidate_facts.py \
            tests/docs/test_docs_guards_workflow.py \
            tests/docs/test_design_tokens.py
          git commit -m 'style: apply Phase 10 Ruff fixes'
          git push
