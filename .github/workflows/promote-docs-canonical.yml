name: Promote documentation to canonical paths

on:
  push:
    branches:
      - agent/docs-content-style-remediation
    paths:
      - '.github/workflows/promote-docs-canonical.yml'

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out promotion branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-content-style-remediation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Promote v2 documentation
        shell: bash
        run: |
          set -euo pipefail

          test -d docs-prototype
          test -f mkdocs.prototype.yml

          SOURCE_REVISION="$(git rev-parse HEAD)"
          export SOURCE_REVISION

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import posixpath
          import re
          from pathlib import Path
          from urllib.parse import urlsplit, urlunsplit

          root = Path.cwd()
          candidate = root / "docs-prototype"
          mapping_path = (
              root
              / ".github"
              / "documentation-program"
              / "content"
              / "migrated-source-pages.json"
          )
          mapping: dict[str, str] = json.loads(mapping_path.read_text(encoding="utf-8"))
          source_revision = os.environ["SOURCE_REVISION"]
          reverse_mapping = {source: target for target, source in mapping.items()}

          inline_link_re = re.compile(
              r"(?P<prefix>!?\[[^\]\n]*\]\()(?P<destination>[^)\n]+)(?P<suffix>\))"
          )
          reference_link_re = re.compile(
              r"^(?P<prefix>\s*\[[^\]]+\]:\s*)(?P<destination>\S+)(?P<suffix>.*)$"
          )
          html_attr_re = re.compile(
              r'(?P<prefix>\b(?P<attr>href|src)=(?P<quote>["\']))'
              r'(?P<destination>[^"\']+)'
              r'(?P<suffix>(?P=quote))',
              re.IGNORECASE,
          )
          empty_anchor_re = re.compile(
              r'<a\s+id=(?P<quote>["\'])(?P<id>[^"\']+)(?P=quote)\s*></a>',
              re.IGNORECASE,
          )

          def canonical_url(target_path: str) -> str:
              value = target_path.strip("/")
              if value == "index.md":
                  return "/"
              if value.endswith("/index.md"):
                  return f"/{value[:-len('index.md')]}"
              if value.endswith(".md"):
                  value = value[:-3]
              return f"/{value}/"

          def split_destination(value: str) -> tuple[str, str]:
              stripped = value.strip()
              if stripped.startswith("<") and ">" in stripped:
                  end = stripped.index(">") + 1
                  return stripped[:end], stripped[end:]
              parts = stripped.split(maxsplit=1)
              return parts[0], f" {parts[1]}" if len(parts) == 2 else ""

          def rewrite_url(url: str, source_path: str, *, image: bool) -> str:
              wrapped = url.startswith("<") and url.endswith(">")
              bare = url[1:-1] if wrapped else url
              parsed = urlsplit(bare)
              if (
                  parsed.scheme
                  or parsed.netloc
                  or bare.startswith(("#", "/", "mailto:", "tel:"))
                  or not parsed.path
              ):
                  return url

              resolved = posixpath.normpath(
                  posixpath.join(posixpath.dirname(source_path), parsed.path)
              )
              migrated_target = reverse_mapping.get(resolved)
              if migrated_target:
                  rewritten = urlunsplit(
                      ("", "", canonical_url(migrated_target), parsed.query, parsed.fragment)
                  )
              else:
                  origin = (
                      "https://raw.githubusercontent.com/full-chaos/dev-health-ops"
                      if image
                      else "https://github.com/full-chaos/dev-health-ops/blob"
                  )
                  rewritten = urlunsplit(
                      (
                          "https",
                          urlsplit(origin).netloc,
                          f"/{'/'.join(origin.split('/')[3:])}/{source_revision}/{resolved}",
                          parsed.query,
                          parsed.fragment,
                      )
                  )
              return f"<{rewritten}>" if wrapped else rewritten

          def rewrite_markdown(markdown: str, source_path: str) -> str:
              output: list[str] = []
              fence: str | None = None
              for line in markdown.splitlines(keepends=True):
                  stripped = line.lstrip()
                  if stripped.startswith(("```", "~~~")):
                      marker = stripped[:3]
                      fence = None if fence == marker else marker if fence is None else fence
                      output.append(line)
                      continue
                  if fence is not None:
                      output.append(line)
                      continue

                  line = empty_anchor_re.sub(
                      lambda match: f'<span id="{match.group("id")}"></span>', line
                  )

                  reference = reference_link_re.match(line)
                  if reference:
                      destination, title = split_destination(
                          reference.group("destination")
                      )
                      rewritten = rewrite_url(destination, source_path, image=False)
                      output.append(
                          f"{reference.group('prefix')}{rewritten}{title}"
                          f"{reference.group('suffix')}"
                      )
                      continue

                  def replace_inline(match: re.Match[str]) -> str:
                      destination, title = split_destination(match.group("destination"))
                      rewritten = rewrite_url(
                          destination,
                          source_path,
                          image=match.group("prefix").startswith("!["),
                      )
                      return (
                          f"{match.group('prefix')}{rewritten}{title}"
                          f"{match.group('suffix')}"
                      )

                  line = inline_link_re.sub(replace_inline, line)

                  def replace_html(match: re.Match[str]) -> str:
                      rewritten = rewrite_url(
                          match.group("destination"),
                          source_path,
                          image=match.group("attr").lower() == "src",
                      )
                      return f"{match.group('prefix')}{rewritten}{match.group('suffix')}"

                  output.append(html_attr_re.sub(replace_html, line))
              return "".join(output)

          for target_path, source_path in mapping.items():
              page = candidate / target_path
              if not page.is_file():
                  raise FileNotFoundError(f"Mapped candidate page does not exist: {page}")
              page.write_text(
                  rewrite_markdown(page.read_text(encoding="utf-8"), source_path),
                  encoding="utf-8",
              )

          provenance = mapping_path.with_name("migrated-source-revision.txt")
          provenance.write_text(f"{source_revision}\n", encoding="utf-8")
          PY

          rm -rf docs
          mv docs-prototype docs
          rm -f mkdocs.yml
          mv mkdocs.prototype.yml mkdocs.yml

          rm -f scripts/mkdocs_migrated_source_links.py

          # Remove temporary formatter probes created during this review.
          while IFS= read -r workflow; do
            if grep -Eqi 'ruff.*(probe|diff)|format.*probe' "$workflow"; then
              rm -f "$workflow"
            fi
          done < <(find .github/workflows -maxdepth 1 -type f -print)

          # Promote all active build, workflow, runbook, source, and inventory paths.
          while IFS= read -r file; do
            sed -i \
              -e 's/mkdocs\.prototype\.yml/mkdocs.yml/g' \
              -e 's/docs-prototype/docs/g' \
              "$file"
          done < <(
            grep -RIl \
              --exclude-dir=.git \
              --exclude='*.png' \
              --exclude='*.jpg' \
              --exclude='*.jpeg' \
              --exclude='*.gif' \
              --exclude='*.webp' \
              --exclude='*.zip' \
              -e 'mkdocs\.prototype\.yml' \
              -e 'docs-prototype' \
              . || true
          )

          python - <<'PY'
          from pathlib import Path
          import re

          config = Path("mkdocs.yml")
          text = config.read_text(encoding="utf-8")
          text = re.sub(
              r"\nhooks:\n\s+- scripts/mkdocs_migrated_source_links\.py\n",
              "\n",
              text,
          )
          config.write_text(text, encoding="utf-8")

          validator = Path("scripts/validate_docs_v2_publication.py")
          text = validator.read_text(encoding="utf-8")
          text = re.sub(
              r'\n\s*if not \(ROOT / source_path\)\.is_file\(\):\n'
              r'\s*errors\.append\(f"migrated-source input does not exist: \{source_path\}"\)',
              "",
              text,
          )
          validator.write_text(text, encoding="utf-8")
          PY

          rm -f .github/workflows/promote-docs-canonical.yml

          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements-docs.txt

          ruff format scripts
          ruff check scripts

          python scripts/validate_docs_v2_publication.py
          python -m mkdocs build --strict --config-file mkdocs.yml
          python scripts/check_built_site_links.py --site-dir .build/docs
          python scripts/check_docs_candidate_search.py \
            --site-dir .build/docs \
            --queries .github/documentation-program/phase-10/search-acceptance.json
          python scripts/check_docs_candidate_accessibility.py \
            --site-dir .build/docs \
            --css docs/stylesheets/extra.css
          python scripts/check_docs_candidate_facts.py

          test -d docs
          test -f mkdocs.yml
          test ! -e docs-prototype
          test ! -e mkdocs.prototype.yml
          ! grep -RIl \
            --exclude-dir=.git \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.gif' \
            --exclude='*.webp' \
            -e 'mkdocs\.prototype\.yml' \
            -e 'docs-prototype' \
            .

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: promote v2 documentation to canonical paths'
          git push origin HEAD:agent/docs-content-style-remediation
