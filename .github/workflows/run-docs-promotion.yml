name: Run canonical documentation promotion

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  promote:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/docs-content-style-remediation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the review branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-content-style-remediation
          fetch-depth: 0

      - name: Promote documentation directories
        shell: bash
        run: |
          set -euo pipefail

          git mv docs .github/docs-legacy
          git mv docs-prototype docs

          rm -f \
            .github/workflows/promote-docs-canonical.yml \
            .github/workflows/run-docs-promotion.yml \
            .github/workflows/ruff-format-probe.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: promote documentation directories'
          git push origin HEAD:agent/docs-content-style-remediation
