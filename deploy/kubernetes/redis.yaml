---
# Valkey Deployment for Celery broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: dev-health
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: dev-health-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          ports:
            - containerPort: 6379
              name: valkey
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: dev-health
  labels:
    app.kubernetes.io/name: valkey
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
  type: ClusterIP
