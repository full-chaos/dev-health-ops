# Bounded exceptions for scripts/check_external_links.py.
#
# Every entry MUST carry an owner, a reason, and an `expires` date. An
# expired entry fails the guard even if the underlying URL happens to be
# reachable again, so a stale exception cannot silently outlive its review
# window. Do not add an entry without a concrete follow-up plan.

