services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: dev-health-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_LISTEN_HOST: "0.0.0.0"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ch}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ch}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dev-health

  valkey:
    image: valkey/valkey:8-alpine
    container_name: dev-health-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - dev-health

  # ===========================================================================
  # Database migrations (one-shot — runs before app services)
  # ===========================================================================
  # Applies PostgreSQL (Alembic, when POSTGRES_URI is set) and ClickHouse
  # schema migrations, then exits 0. App services gate on this completing
  # successfully via depends_on.condition: service_completed_successfully and
  # run with AUTO_RUN_MIGRATIONS=false so they never ambient-migrate
  # (CHAOS-2304 — migration 042+ does shadow-table rebuilds that are not safe
  # to run concurrently from workers).
  #
  # POSTGRES_URI must point DIRECTLY at Postgres (port 5432), never at a
  # transaction-mode pooler (PgBouncer/RDS Proxy): migrations run raw DDL.
  # See docs/ops/database-connection-pooling.md.
  #
  # OPERATOR RECOVERY — failed migrate run: with restart: "no", a failed
  # migrate is NOT retried, and api/billing-edge/worker stay gated (Created,
  # never started) until it completes successfully. To inspect and re-run:
  #
  #   docker compose -f compose.production.yml logs migrate   # why it failed
  #   docker compose -f compose.production.yml up migrate     # re-run just migrations
  #   docker compose -f compose.production.yml up -d          # then start the rest
  #
  # `dev-hops migrate clickhouse status` (read-only) shows applied vs pending
  # migrations; `--check` makes it exit 1 while any migration is pending.
  migrate:
    image: ${DEV_HEALTH_IMAGE:-ghcr.io/your-org/dev-health-ops:latest}
    container_name: dev-health-migrate
    restart: "no"
    entrypoint:
      - sh
      - -c
      - >-
        if [ -n "$$POSTGRES_URI" ]; then dev-hops migrate postgres; fi
        && dev-hops migrate clickhouse
    environment:
      # Direct Postgres URI (5432), NOT pgbouncer — empty skips the Alembic step.
      POSTGRES_URI: ${POSTGRES_URI:-}
      CLICKHOUSE_URI: clickhouse://${CLICKHOUSE_USER:-ch}:${CLICKHOUSE_PASSWORD:-ch}@clickhouse:8123/${CLICKHOUSE_DB:-default}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - dev-health

  api:
    image: ${DEV_HEALTH_IMAGE:-ghcr.io/your-org/dev-health-ops:latest}
    container_name: dev-health-api
    restart: unless-stopped
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    environment:
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CLICKHOUSE_URI: clickhouse://${CLICKHOUSE_USER:-ch}:${CLICKHOUSE_PASSWORD:-ch}@clickhouse:8123/${CLICKHOUSE_DB:-default}
      REDIS_URL: redis://valkey:6379/1
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      GRAPHQL_QUERY_TIMEOUT: ${GRAPHQL_QUERY_TIMEOUT:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROVIDER_SYNC_QUEUES_ENABLED: ${PROVIDER_SYNC_QUEUES_ENABLED:-true}
      SYNC_COST_CLASS_QUEUES: ${SYNC_COST_CLASS_QUEUES:-true}
      HIDE_MIGRATED_CHILD_CONFIGS: ${HIDE_MIGRATED_CHILD_CONFIGS:-true}
      SYNC_RUN_MAX_UNITS: ${SYNC_RUN_MAX_UNITS:-1000}
      SYNC_UNIT_CONCURRENCY_PER_BUCKET: ${SYNC_UNIT_CONCURRENCY_PER_BUCKET:-8}
      SYNC_UNIT_DISPATCH_STALE_SECONDS: ${SYNC_UNIT_DISPATCH_STALE_SECONDS:-900}
      SYNC_UNIT_RUNNING_STALE_SECONDS: ${SYNC_UNIT_RUNNING_STALE_SECONDS:-3600}
      LINEAR_BACKFILL_MAX_WINDOW_DAYS: ${LINEAR_BACKFILL_MAX_WINDOW_DAYS:-14}
      SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES: ${SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES:-1}
      SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS: ${SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS:-60}
      SYNC_DISPATCH_REDISPATCH_COUNTDOWN: ${SYNC_DISPATCH_REDISPATCH_COUNTDOWN:-60}
      SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS: ${SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS:-300}
      SYNC_WATERMARK_OVERLAP: ${SYNC_WATERMARK_OVERLAP:-0}
      SYNC_BUDGET_BUCKET_LIMITS: ${SYNC_BUDGET_BUCKET_LIMITS:-}
      SYNC_BUDGET_DEFAULT_LIMIT: ${SYNC_BUDGET_DEFAULT_LIMIT:-1000000}
      SYNC_BUDGET_DEFERRAL_SECONDS: ${SYNC_BUDGET_DEFERRAL_SECONDS:-60}
      SYNC_BUDGET_DEFERRAL_JITTER_SECONDS: ${SYNC_BUDGET_DEFERRAL_JITTER_SECONDS:-5}
      SYNC_BUDGET_DRY_RUN_BUCKET_LIMITS: ${SYNC_BUDGET_DRY_RUN_BUCKET_LIMITS:-}
      SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT: ${SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT:-1000000}
      SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS: ${SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS:-60}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_BASE_URL: ${GITHUB_BASE_URL:-https://api.github.com}
      GITHUB_LINEAR_LINKBACK_BOTS: ${GITHUB_LINEAR_LINKBACK_BOTS:-linear[bot]}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_TRUSTED_SCM_HOSTS: ${LINEAR_TRUSTED_SCM_HOSTS:-}
      # Schema is applied by the one-shot `migrate` service (gated via
      # depends_on) — the API must never run migrations itself (CHAOS-2304).
      AUTO_RUN_MIGRATIONS: "false"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dev-health
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"

  billing-edge:
    image: ${DEV_HEALTH_IMAGE:-ghcr.io/your-org/dev-health-ops:latest}
    container_name: dev-health-billing-edge
    restart: unless-stopped
    command:
      - python
      - -m
      - uvicorn
      - dev_health_ops.api.billing_edge:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      POSTGRES_URI: ${POSTGRES_URI:-}
      # CHAOS-2065: set true when POSTGRES_URI points at a transaction-mode
      # pooler (PgBouncer/RDS Proxy/etc). See docs/ops/database-connection-pooling.md.
      PGBOUNCER_TRANSACTION_MODE: ${PGBOUNCER_TRANSACTION_MODE:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_TEAM: ${STRIPE_PRICE_ID_TEAM:-}
      STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}
      LICENSE_PRIVATE_KEY: ${LICENSE_PRIVATE_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BILLING_EDGE_PORT:-8010}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dev-health
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  # Worker topology split by latency class (CHAOS-2278) so long-running batch
  # work never starves user-facing tasks. Cost-class sub-queues (CHAOS-2517)
  # ride along: light/medium on `worker`, heavy on `worker-heavy`.
  worker: &worker-base
    image: ${DEV_HEALTH_IMAGE:-ghcr.io/your-org/dev-health-ops:latest}
    container_name: dev-health-worker
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: ${WORKER_STOP_GRACE_PERIOD:-3700s}
    entrypoint:
      - celery
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - default,sync,sync.github,sync.gitlab,sync.linear,sync.jira,sync.launchdarkly,sync.github.light,sync.github.medium,sync.gitlab.light,sync.gitlab.medium,sync.jira.medium,sync.linear.medium,webhooks,reports,scheduler,monitoring
      - --concurrency=${WORKER_CONCURRENCY:-4}
    environment:
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      DATABASE_URI: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CLICKHOUSE_URI: clickhouse://${CLICKHOUSE_USER:-ch}:${CLICKHOUSE_PASSWORD:-ch}@clickhouse:8123/${CLICKHOUSE_DB:-default}
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROVIDER_SYNC_QUEUES_ENABLED: ${PROVIDER_SYNC_QUEUES_ENABLED:-true}
      SYNC_COST_CLASS_QUEUES: ${SYNC_COST_CLASS_QUEUES:-true}
      HIDE_MIGRATED_CHILD_CONFIGS: ${HIDE_MIGRATED_CHILD_CONFIGS:-true}
      SYNC_RUN_MAX_UNITS: ${SYNC_RUN_MAX_UNITS:-1000}
      SYNC_UNIT_CONCURRENCY_PER_BUCKET: ${SYNC_UNIT_CONCURRENCY_PER_BUCKET:-8}
      SYNC_UNIT_DISPATCH_STALE_SECONDS: ${SYNC_UNIT_DISPATCH_STALE_SECONDS:-900}
      SYNC_UNIT_RUNNING_STALE_SECONDS: ${SYNC_UNIT_RUNNING_STALE_SECONDS:-3600}
      LINEAR_BACKFILL_MAX_WINDOW_DAYS: ${LINEAR_BACKFILL_MAX_WINDOW_DAYS:-14}
      SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES: ${SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES:-1}
      SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS: ${SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS:-60}
      SYNC_DISPATCH_REDISPATCH_COUNTDOWN: ${SYNC_DISPATCH_REDISPATCH_COUNTDOWN:-60}
      SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS: ${SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS:-300}
      SYNC_WATERMARK_OVERLAP: ${SYNC_WATERMARK_OVERLAP:-0}
      SYNC_BUDGET_BUCKET_LIMITS: ${SYNC_BUDGET_BUCKET_LIMITS:-}
      SYNC_BUDGET_DEFAULT_LIMIT: ${SYNC_BUDGET_DEFAULT_LIMIT:-1000000}
      SYNC_BUDGET_DEFERRAL_SECONDS: ${SYNC_BUDGET_DEFERRAL_SECONDS:-60}
      SYNC_BUDGET_DEFERRAL_JITTER_SECONDS: ${SYNC_BUDGET_DEFERRAL_JITTER_SECONDS:-5}
      SYNC_BUDGET_DRY_RUN_BUCKET_LIMITS: ${SYNC_BUDGET_DRY_RUN_BUCKET_LIMITS:-}
      SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT: ${SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT:-1000000}
      SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS: ${SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS:-60}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_BASE_URL: ${GITHUB_BASE_URL:-https://api.github.com}
      GITHUB_LINEAR_LINKBACK_BOTS: ${GITHUB_LINEAR_LINKBACK_BOTS:-linear[bot]}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_TRUSTED_SCM_HOSTS: ${LINEAR_TRUSTED_SCM_HOSTS:-}
      # Schema is applied by the one-shot `migrate` service (gated via
      # depends_on) — workers must never run migrations themselves (CHAOS-2304).
      AUTO_RUN_MIGRATIONS: "false"
    depends_on:
      clickhouse:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - dev-health
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"
        reservations:
          memory: 256M
          cpus: "0.1"

  worker-ingest:
    <<: *worker-base
    container_name: dev-health-worker-ingest
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - ingest
      - --concurrency=1

  # CHAOS-2693 D8/master-spec CC11: dedicated queue/container. DEPLOYMENT
  # INVARIANT: exactly ONE replica at --concurrency=1 (reclaim/redelivery
  # assumes a single logical consumer identity draining the PEL).
  worker-external-ingest:
    <<: *worker-base
    container_name: dev-health-worker-external-ingest
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - external-ingest
      - --concurrency=1

  worker-heavy:
    <<: *worker-base
    container_name: dev-health-worker-heavy
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - worker
      - --loglevel=info
      - --disable-prefetch
      - -Q
      - metrics,backfill,scheduler,monitoring,sync.github.heavy,sync.gitlab.heavy
      - --concurrency=${WORKER_HEAVY_CONCURRENCY:-2}

  beat:
    <<: *worker-base
    container_name: dev-health-beat
    command:
      - -A
      - dev_health_ops.workers.celery_app
      - beat
      - --loglevel=info
      - --schedule=/tmp/celerybeat-schedule
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.05"

  pgbouncer:
    # CHAOS-2065: optional transaction-mode pooler in front of a managed
    # Postgres. If the provider already supplies a hosted transaction pooler,
    # point app services directly at that endpoint and set
    # PGBOUNCER_TRANSACTION_MODE=true.
    # Disabled unless explicitly enabled:
    #   docker compose --profile pooler up -d
    # Then point Postgres consumers at it and flip the app flag:
    #   POSTGRES_URI=postgresql+asyncpg://USER:PASS@pgbouncer:6432/DB
    #   PGBOUNCER_TRANSACTION_MODE=true
    # See docs/ops/database-connection-pooling.md
    profiles: ["pooler"]
    image: edoburu/pgbouncer:latest
    container_name: dev-health-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: ${POSTGRES_HOST:?set POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:?set POSTGRES_DB}
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-1000}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    networks:
      - dev-health
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  clickhouse_data:
    driver: local
  valkey_data:
    driver: local

networks:
  dev-health:
    driver: bridge
