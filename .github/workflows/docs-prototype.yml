name: Documentation v2 prototype

on:
  pull_request:
    paths:
      - 'docs-prototype/**'
      - 'mkdocs.prototype.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt
      - name: Build the v2 prototype
        run: mkdocs build --strict --config-file mkdocs.prototype.yml
      - name: Upload the v2 prototype site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-v2-prototype-site
          path: .build/docs-prototype
          if-no-files-found: error
          retention-days: 14
