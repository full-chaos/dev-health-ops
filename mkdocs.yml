site_name: dev-health-ops
site_description: Developer health and operations analytics platform

repo_name: dev-health-ops
repo_url: https://github.com/chrisgeo/dev-health-ops
edit_uri: ""

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Product:
      - PRD: product/prd.md
      - Feature Flag and User Impact PRD: product/feature-flag-user-impact-prd.md
      - Feature Flag PRD Review: product/feature-flag-prd-review.md
      - Product Brief: product/product-brief.md
      - Concepts: product/concepts.md
      - Investment Taxonomy: product/investment-taxonomy.md
      - Capacity Planning: product/capacity-planning.md
      - Monetization Strategy: monetization-strategy.md
  - Getting Started: getting-started.md
  - Self-Hosted Quickstart: self-hosted-quickstart.md
  - Configuration: configuration.md
  - Team Configuration: team-configuration.md
  - Email Setup: email-setup.md
  - SSO Setup: sso-setup.md
  - Webhooks: webhooks.md
  - Alerting: alerting.md
  - Architecture:
      - Overview: architecture.md
      - Data Pipeline: architecture/data-pipeline.md
      - Repo Layout: architecture/repo-layout.md
      - Frontend Architecture: architecture/frontend-architecture.md
      - Middleware Impersonation: architecture/middleware-impersonation.md
      - Auth User Journeys: architecture/auth-journey.md
      - Database Architecture: architecture/database-architecture.md
      - Normalization Helpers: architecture/normalization-helpers.md
      - Enterprise Overview: architecture/enterprise-overview.md
      - Licensing: architecture/licensing.md
      - ADR-001 Enterprise Edition: architecture/adr/001-enterprise-edition.md
  - Operations:
      - Observability Tooling: ops/observability-tooling.md
      - Deployment Guide: ops/deployment-guide.md
      - Connector Inventory: ops/connector-inventory.md
      - Stripe Billing Runbook: ops/stripe-billing-runbook.md
      - Testing Governance: ops/testing-governance.md
      - Enterprise Test Plan: ops/enterprise-test-plan.md
      - Workers: ops/workers.md
      - SLOs: slos.md
  - CLI:
      - Overview: cli.md
      - Reference: ops/cli-reference.md
  - Connectors:
      - Usage: CONNECTOR_USAGE.md
      - Private Repos: PRIVATE_REPO_TESTING.md
  - Metrics:
      - Overview: metrics.md
      - Inventory: metrics-inventory.md
      - Canonical Metrics (API Mapping): canonical-metrics.md
      - Canonical Metrics (PRD): computations/canonical-metrics-prd.md
      - Metric Calculations: computations/metric-calculations.md
      - Computations Index: computations/index.md
      - Views Index: user-guide/views-index.md
      - Views:
          - Investment View: user-guide/investment-view.md
          - Investment Mix: user-guide/views/investment-mix.md
          - Investment Flows: user-guide/views/investment-flows.md
          - Investment Expense: user-guide/views/investment-expense.md
          - Code Hotspots: user-guide/views/code-hotspots.md
          - PR Flow: user-guide/views/pr-flow.md
          - Quadrants: user-guide/views/quadrants.md
          - Flame Diagrams: user-guide/views/flame-diagrams.md
          - Capacity Planning: user-guide/views/capacity-planning.md
          - Work Graph View: user-guide/views/work-graph.md
      - Work Graph: user-guide/work-graph.md
      - Reports: user-guide/reports.md
  - API:
      - GraphQL Overview: api/graphql-overview.md
      - Persisted Queries: api/persisted-queries.md
      - View Mapping: api/view-mapping.md
      - Web GraphQL Client: api/web-graphql-client.md
      - Web Investment Queries: api/web-graphql-investment.md
  - Visualizations: visualizations/patterns.md
  - LLM: llm/categorization-contract.md
  - Task Trackers: task_trackers.md
  - Roadmap: roadmap.md
  - Project Plan: project.md
  - Appendix:
      - Agent Instructions (index): appendix/agent-instructions/README.md


      - Legacy: appendix/legacy/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
