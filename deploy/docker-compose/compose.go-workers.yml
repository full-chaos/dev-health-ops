# Additive Go/River worker topology. This file is intentionally not included by
# compose.yml or compose.production.yml: operators must opt in explicitly.
#
# Coexistence:
#   docker compose -f compose.production.yml -f compose.go-workers.yml \
#     --profile go-workers up -d
#
# The checked-in routing contract remains Celery-owned. Starting these
# containers alone does not transfer a queue or scheduler ownership.
services:
  # The canonical Python migrate service owns Alembic and ClickHouse. Re-run
  # role provisioning only after it completes so guarded grants see every
  # current semantic table, including an already-initialized local volume.
  go-river-provision:
    image: postgres:18-alpine
    profiles: [go-workers]
    restart: "no"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-devhealth}
      RIVER_DOMAIN_DATABASE_ROLE: ${RIVER_DOMAIN_DATABASE_ROLE:-devhealth_domain}
      RIVER_QUEUE_DATABASE_ROLE: ${RIVER_QUEUE_DATABASE_ROLE:-devhealth_queue}
      RIVER_DOMAIN_DATABASE_PASSWORD: ${RIVER_DOMAIN_DATABASE_PASSWORD:-devhealth_domain}
      RIVER_QUEUE_DATABASE_PASSWORD: ${RIVER_QUEUE_DATABASE_PASSWORD:-devhealth_queue}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        exec psql \
          --host="${POSTGRES_HOST:-postgres}" \
          --username="${POSTGRES_USER:-devhealth}" \
          --dbname="${POSTGRES_DB:-devhealth}" \
          --set=domain_role="$$RIVER_DOMAIN_DATABASE_ROLE" \
          --set=queue_role="$$RIVER_QUEUE_DATABASE_ROLE" \
          --set=domain_password="$$RIVER_DOMAIN_DATABASE_PASSWORD" \
          --set=queue_password="$$RIVER_QUEUE_DATABASE_PASSWORD" \
          --file=/opt/dev-health/provision_river_roles.sql
    volumes:
      - ../../scripts/worker/provision_river_roles.sql:/opt/dev-health/provision_river_roles.sql:ro
    networks: [dev-health]
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Apply the pinned River bundle with the elevated local/admin DSN, then
  # independently check that the resulting schema is current. Neither DSN nor
  # this binary is exposed to a long-running Go service.
  go-river-migrate:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: runner
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0
    profiles: [go-workers]
    restart: "no"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    entrypoint:
      - /bin/sh
      - -ec
      - >-
        if [ -z "$$MIGRATION_DATABASE_URI" ];
        then export MIGRATION_DATABASE_URI="postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@$$POSTGRES_HOST:5432/$$POSTGRES_DB";
        fi;
        dev-health-worker-migrate
        && dev-health-worker-migrate --check
    environment:
      MIGRATION_DATABASE_URI: ${GO_WORKER_MIGRATION_DATABASE_URI:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-devhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devhealth}
      POSTGRES_DB: ${POSTGRES_DB:-devhealth}
      RIVER_DATABASE_SCHEMA: ${RIVER_DATABASE_SCHEMA:-river}
      RIVER_DOMAIN_DATABASE_ROLE: ${RIVER_DOMAIN_DATABASE_ROLE:-devhealth_domain}
      RIVER_QUEUE_DATABASE_ROLE: ${RIVER_QUEUE_DATABASE_ROLE:-devhealth_queue}
    networks: [dev-health]
    depends_on:
      go-river-provision:
        condition: service_completed_successfully

  # Validate the exact checked-in job registry and deployment profile before
  # Compose is allowed to start any long-running Go process.
  go-contractcheck:
    build:
      context: ../..
      dockerfile: docker/go-worker.Dockerfile
      target: contractcheck
    profiles: [go-workers]
    restart: "no"
    read_only: true
    user: "65532:65532"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    network_mode: none
    command: [validate]
    depends_on:
      go-river-migrate:
        condition: service_completed_successfully

  go-worker-heavy: &go-worker
    image: ${DEV_HEALTH_GO_WORKER_IMAGE:-ghcr.io/full-chaos/dev-health-go-worker:latest}
    profiles: [go-workers]
    restart: unless-stopped
    read_only: true
    user: "65532:65532"
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    environment: &go-worker-env
      DEV_HEALTH_HTTP_ADDR: ":8080"
      DEV_HEALTH_PROFILE: heavy
      POSTGRES_URI: ${POSTGRES_URI:?direct domain PostgreSQL URI is required}
      WORKER_DATABASE_URI: ${WORKER_DATABASE_URI:?queue-control PostgreSQL URI is required}
      CLICKHOUSE_URI: clickhouse://${CLICKHOUSE_USER:-ch}:${CLICKHOUSE_PASSWORD:-ch}@clickhouse:8123/${CLICKHOUSE_DB:-default}
      VALKEY_URI: redis://valkey:6379/1
      RIVER_DATABASE_SCHEMA: ${RIVER_DATABASE_SCHEMA:-river}
      RIVER_DOMAIN_DATABASE_ROLE: ${RIVER_DOMAIN_DATABASE_ROLE:-devhealth_domain}
      RIVER_QUEUE_DATABASE_ROLE: ${RIVER_QUEUE_DATABASE_ROLE:-devhealth_queue}
      WORKER_DATABASE_MODE: ${WORKER_DATABASE_MODE:-direct}
      DEV_HEALTH_LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTO_RUN_MIGRATIONS: "false"
    networks: [dev-health]
    depends_on:
      go-contractcheck:
        condition: service_completed_successfully
    deploy: &go-worker-resources
      resources:
        limits: {cpus: "1.0", memory: 1G}
        reservations: {cpus: "0.25", memory: 256M}

  go-worker-latency:
    <<: *go-worker
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: latency
    deploy:
      resources:
        limits: {cpus: "0.5", memory: 512M}
        reservations: {cpus: "0.10", memory: 128M}

  go-worker-ops:
    <<: *go-worker
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: ops

  # Runtime profile remains `sync`; its provider-unit handler consumes the
  # separately-owned River queue `sync_provider` once the provider contract
  # release is present.
  go-worker-sync-provider:
    <<: *go-worker
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: sync

  go-reconciler:
    <<: *go-worker
    image: ${DEV_HEALTH_GO_RECONCILER_IMAGE:-ghcr.io/full-chaos/dev-health-go-reconciler:latest}
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: ""

  go-scheduler:
    <<: *go-worker
    image: ${DEV_HEALTH_GO_SCHEDULER_IMAGE:-ghcr.io/full-chaos/dev-health-go-scheduler:latest}
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: ""

  go-stream-external:
    <<: *go-worker
    image: ${DEV_HEALTH_GO_STREAM_RUNNER_IMAGE:-ghcr.io/full-chaos/dev-health-go-stream-runner:latest}
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: external

  go-stream-ingest:
    <<: *go-worker
    image: ${DEV_HEALTH_GO_STREAM_RUNNER_IMAGE:-ghcr.io/full-chaos/dev-health-go-stream-runner:latest}
    environment:
      <<: *go-worker-env
      DEV_HEALTH_PROFILE: ingest
