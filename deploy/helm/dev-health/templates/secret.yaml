{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dev-health.secretName" . }}
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- include "dev-health.secretData" . | trim | nindent 2 }}
{{- end }}
