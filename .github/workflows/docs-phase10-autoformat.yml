name: Documentation Phase 10 formatter

on:
  push:
    branches:
      - agent/docs-phase-10-quality
    paths:
      - '.github/workflows/docs-phase10-autoformat.yml'
      - 'scripts/check_docs_candidate_search.py'
      - 'scripts/check_docs_candidate_accessibility.py'
      - 'scripts/check_docs_candidate_facts.py'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/docs-phase-10-quality
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Format the Phase 10 checks
        run: |
          python -m pip install ruff
          ruff format \
            scripts/check_docs_candidate_search.py \
            scripts/check_docs_candidate_accessibility.py \
            scripts/check_docs_candidate_facts.py
      - name: Commit formatting when needed
        run: |
          if git diff --quiet; then
            echo 'Phase 10 checks are already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            scripts/check_docs_candidate_search.py \
            scripts/check_docs_candidate_accessibility.py \
            scripts/check_docs_candidate_facts.py
          git commit -m 'style: format the Phase 10 documentation checks'
          git push
