name: Ruff format probe

on:
  push:
    branches:
      - agent/docs-content-style-remediation

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install --quiet ruff

      - name: Capture formatter diff
        run: |
          ruff format --diff . > ruff-format.diff || true
          test -s ruff-format.diff

      - name: Upload formatter diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6
        with:
          name: ruff-format-diff
          path: ruff-format.diff
          if-no-files-found: error
