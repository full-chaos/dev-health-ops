---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-health-api
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: dev-health-ops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-health-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-health-api
    spec:
      securityContext:
        runAsNonRoot: true
      # CHAOS-2304 safety net: a naive `kubectl apply -k deploy/kubernetes/`
      # rolls Deployments without waiting for the migrate Job. This
      # initContainer blocks app start until all ClickHouse migrations are
      # applied. It is strictly READ-ONLY (`status --check` — exit 0 when
      # current, 1 when pending); the one-shot Job (migrate-job.yaml) remains
      # the only thing that runs DDL. After 60 pending checks (~5 min) it
      # exits 1 and relies on kubelet restart backoff as the overall timeout.
      # The recommended deploy flow (README.md: `kubectl wait` on the Job)
      # still applies — this is the safety net, not the primary ordering.
      initContainers:
        - name: wait-for-migrations
          image: ghcr.io/your-org/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              attempts=0
              until dev-hops migrate clickhouse status --check; do
                attempts=$((attempts + 1))
                if [ "$attempts" -ge 60 ]; then
                  echo "ClickHouse migrations still pending after $attempts checks; exiting for restart backoff" >&2
                  exit 1
                fi
                echo "ClickHouse migrations pending; re-checking in 5s (attempt $attempts/60)"
                sleep 5
              done
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      containers:
        - name: api
          image: ghcr.io/your-org/dev-health-ops:latest
          # Or use: your-registry/dev-health-ops:latest
          securityContext:
            allowPrivilegeEscalation: false
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: dev-health-config
            - secretRef:
                name: dev-health-secrets
          env:
            - name: REDIS_URL
              value: "redis://valkey:6379/1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: dev-health-api
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health-api
spec:
  selector:
    app.kubernetes.io/name: dev-health-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dev-health-api-hpa
  namespace: dev-health
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dev-health-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
