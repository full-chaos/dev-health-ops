site_name: Dev Health documentation
site_description: Task-oriented Dev Health documentation with the Full Chaos visual identity.
site_url: https://docs.fullchaos.dev
repo_name: Full Chaos / Dev Health
repo_url: https://github.com/full-chaos/dev-health-ops
edit_uri: edit/main/docs-prototype/

docs_dir: docs-prototype
site_dir: .build/docs-prototype

theme:
  name: material
  logo: assets/fcd-simplified.png
  favicon: assets/fcd-simplified.png
  font: false
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Use dark theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Use light theme

