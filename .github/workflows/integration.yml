name: Integration Tests
env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  GITLAB_TOKEN: ${{ secrets.GL_TOKEN }}
on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests (conditional)
    runs-on: ubuntu-24.04-arm
    # Integration tests need package read access for dependency installs.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GL_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          SKIP_INTEGRATION_TESTS: ${{ secrets.SKIP_INTEGRATION_TESTS }}
          # No OTLP collector in CI; OTEL on floods logs with localhost:4317
          # export retries. We don't assert OTEL stats in CI.
          OTEL_ENABLED: "false"
        run: |
          chmod +x ci/run_tests.sh
          mkdir -p test-results/logs
          set -o pipefail
          ./ci/run_tests.sh integration 2>&1 | tee test-results/logs/integration.log

      - name: Upload integration junit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-junit
          path: test-results/junit/integration.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-logs
          path: |
            test-results/logs/*.log
            **/pytest.log
          if-no-files-found: ignore
          retention-days: 14
