---
# Secrets for dev-health-ops
# NOTE: In production, use external secret management (Vault, AWS Secrets Manager, etc.)
# These values should be base64 encoded
apiVersion: v1
kind: Secret
metadata:
  name: dev-health-secrets
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  # Replace with your actual values
  DATABASE_URI: "clickhouse://ch:ch@clickhouse:8123/default"
  # CLICKHOUSE_URI is what `dev-hops migrate clickhouse` (the migrate Job) and
  # `dev-hops migrate clickhouse status --check` (the wait-for-migrations
  # initContainers) resolve — DATABASE_URI is NOT consulted by those commands.
  # Keep both in sync; they should point at the same ClickHouse DSN.
  CLICKHOUSE_URI: "clickhouse://ch:ch@clickhouse:8123/default"
  SECONDARY_DATABASE_URI: ""
  
  # Provider tokens
  # IMPORTANT: Replace these with actual tokens
  GITHUB_TOKEN: ""
  GITHUB_APP_PRIVATE_KEY: ""
  GITLAB_TOKEN: ""
  LINEAR_API_KEY: ""
  
  # Jira credentials
  JIRA_BASE_URL: ""
  JIRA_EMAIL: ""
  JIRA_API_TOKEN: ""
  
  # Valkey password (if using authentication)
  REDIS_PASSWORD: ""
---
# Separate secret for ClickHouse credentials
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-credentials
  namespace: dev-health
type: Opaque
stringData:
  CLICKHOUSE_USER: "ch"
  CLICKHOUSE_PASSWORD: "ch"
  CLICKHOUSE_DB: "default"
---
# Separate secret for PostgreSQL credentials (if using)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: dev-health
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "devhealth"
