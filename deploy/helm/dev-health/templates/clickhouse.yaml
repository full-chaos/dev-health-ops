{{- if .Values.clickhouse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dev-health.fullname" . }}-clickhouse
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "clickhouse" "context" $) | nindent 4 }}
spec:
  serviceName: {{ include "dev-health.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "dev-health.componentSelectorLabels" (dict "component" "clickhouse" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dev-health.componentSelectorLabels" (dict "component" "clickhouse" "context" $) | nindent 8 }}
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.credentials.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.clickhouse.credentials.password | quote }}
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.credentials.database | quote }}
            - name: CLICKHOUSE_LISTEN_HOST
              value: "0.0.0.0"
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          {{- if .Values.clickhouse.persistence.enabled }}
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
          {{- end }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-health.fullname" . }}-clickhouse
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "clickhouse" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dev-health.componentSelectorLabels" (dict "component" "clickhouse" "context" $) | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
{{- end }}
