{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dev-health.fullname" . }}-redis
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "redis" "context" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dev-health.componentSelectorLabels" (dict "component" "redis" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dev-health.componentSelectorLabels" (dict "component" "redis" "context" $) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
          args:
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 3
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
      {{- if .Values.redis.persistence.enabled }}
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ include "dev-health.fullname" . }}-redis
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-health.fullname" . }}-redis
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "redis" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dev-health.componentSelectorLabels" (dict "component" "redis" "context" $) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- if .Values.redis.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dev-health.fullname" . }}-redis
  namespace: {{ include "dev-health.namespace" . }}
  labels:
    {{- include "dev-health.componentLabels" (dict "component" "redis" "context" $) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}
{{- end }}
