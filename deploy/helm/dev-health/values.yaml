# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []
  # -- Override the namespace
  namespaceOverride: ""

# -- Image configuration for the backend (API, worker, beat, cronjobs)
image:
  repository: ghcr.io/full-chaos/dev-health-ops
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# -- Image configuration for the frontend (web)
webImage:
  repository: ghcr.io/full-chaos/dev-health-web
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

# -- Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# =============================================================================
# API (FastAPI backend)
# =============================================================================
api:
  enabled: true
  replicas: 2
  port: 8000
  args:
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  # -- Extra environment variables (list of name/value pairs)
  extraEnv: []

# =============================================================================
# Billing Edge API
# =============================================================================
billingEdge:
  enabled: false
  replicas: 1
  port: 8010
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Celery Worker
# =============================================================================
worker:
  enabled: true
  replicas: 2
  # Default fleet (CHAOS-2278): latency-sensitive queues + light/medium cost-class
  # sub-queues (CHAOS-2517). metrics/backfill/ingest/heavy live on the pools below.
  queues: "default,sync,sync.github,sync.gitlab,sync.linear,sync.jira,sync.launchdarkly,sync.github.light,sync.github.medium,sync.gitlab.light,sync.gitlab.medium,sync.jira.medium,sync.linear.medium,webhooks,reports,scheduler,monitoring"
  concurrency: 4
  logLevel: info
  terminationGracePeriodSeconds: 3700
  progressDeadlineSeconds: 7600
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    exec:
      command:
        - celery
        - -A
        - dev_health_ops.workers.celery_app
        - inspect
        - ping
        - --timeout
        - "10"
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 15
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# Ingest pool (CHAOS-2278): isolated single slot for blocking stream consumers
# so they never starve the default fleet. Fixed-replica (no autoscaling).
workerIngest:
  enabled: true
  replicas: 1
  queues: "ingest"
  concurrency: 1
  logLevel: info
  terminationGracePeriodSeconds: 3700
  progressDeadlineSeconds: 7600
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# External-ingest pool (CHAOS-2693 D8/master-spec CC11): isolated single
# slot for the customer-push durable-stream consumer, dedicated queue (not
# shared with workerIngest) so a slow external customer can't starve
# internal ingest/telemetry, nor vice versa. Fixed-replica (no
# autoscaling) -- DEPLOYMENT INVARIANT: exactly ONE replica at
# concurrency 1; the reclaim/redelivery design assumes a single logical
# consumer identity draining the PEL.
workerExternalIngest:
  enabled: true
  replicas: 1
  queues: "external-ingest"
  concurrency: 1
  logLevel: info
  terminationGracePeriodSeconds: 3700
  progressDeadlineSeconds: 7600
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Heavy pool (CHAOS-2278 / CHAOS-2517): batch compute (metrics, backfill) +
# heavy cost-class sync sub-queues, isolated from latency-sensitive work.
workerHeavy:
  enabled: true
  replicas: 2
  queues: "metrics,backfill,scheduler,monitoring,sync.github.heavy,sync.gitlab.heavy"
  concurrency: 2
  logLevel: info
  terminationGracePeriodSeconds: 3700
  progressDeadlineSeconds: 7600
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "3Gi"
      cpu: "1500m"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Go/River workers (CHAOS-3052)
# =============================================================================
# This topology is additive and default-off. It deploys no Go pod until an
# operator explicitly sets goWorkers.enabled=true after the route-owner gates
# in deploy/go-workers/README.md. The go-only values file scales Celery/Beat
# to zero but retains their definitions and Valkey DB 0.
goWorkers:
  enabled: false
  profiles:
    - name: heavy
      image: ghcr.io/full-chaos/dev-health-go-worker:latest
      runtimeProfile: heavy
      replicas: 0
      terminationGracePeriodSeconds: 120
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: true, minReplicas: 0, maxReplicas: 1, queueDepth: 1, oldestAgeSeconds: 60, saturationMilli: 800m}
    - name: latency
      image: ghcr.io/full-chaos/dev-health-go-worker:latest
      runtimeProfile: latency
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 512Mi}}
      autoscaling: {enabled: true, minReplicas: 0, maxReplicas: 2, queueDepth: 1, oldestAgeSeconds: 30, saturationMilli: 800m}
    - name: ops
      image: ghcr.io/full-chaos/dev-health-go-worker:latest
      runtimeProfile: ops
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: true, minReplicas: 0, maxReplicas: 1, queueDepth: 1, oldestAgeSeconds: 60, saturationMilli: 800m}
    - name: sync
      image: ghcr.io/full-chaos/dev-health-go-worker:latest
      runtimeProfile: sync
      queue: sync.provider
      replicas: 0
      terminationGracePeriodSeconds: 120
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: true, minReplicas: 0, maxReplicas: 2, queueDepth: 1, oldestAgeSeconds: 60, saturationMilli: 800m}
    - name: reconciler
      image: ghcr.io/full-chaos/dev-health-go-reconciler:latest
      runtimeProfile: ""
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: false}
    - name: scheduler
      image: ghcr.io/full-chaos/dev-health-go-scheduler:latest
      runtimeProfile: ""
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 512Mi}}
      autoscaling: {enabled: false}
    - name: stream-external
      image: ghcr.io/full-chaos/dev-health-go-stream-runner:latest
      runtimeProfile: external
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: false}
    - name: stream-ingest
      image: ghcr.io/full-chaos/dev-health-go-stream-runner:latest
      runtimeProfile: ingest
      replicas: 0
      terminationGracePeriodSeconds: 60
      resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "1", memory: 1Gi}}
      autoscaling: {enabled: false}

# =============================================================================
# Celery Beat (scheduler)
# =============================================================================
beat:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Web Frontend (Next.js)
# =============================================================================
web:
  enabled: true
  replicas: 2
  port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  env:
    BACKEND_URL: ""  # defaults to http://<release>-api:8000
    AUTH_SECRET: ""
    NODE_ENV: "production"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# =============================================================================
# Database migrations (CHAOS-2304)
# =============================================================================
# When enabled, a pre-install/pre-upgrade Helm hook Job applies PostgreSQL
# (Alembic) + ClickHouse migrations before the release's workloads are
# (re)deployed, and the shared ConfigMap sets AUTO_RUN_MIGRATIONS=false so
# api/worker/beat never ambient-migrate. Set config.AUTO_RUN_MIGRATIONS
# explicitly to override the computed value.
#
# The preferred MIGRATION_DATABASE_URI used for Alembic plus River must point
# DIRECTLY at Postgres. Legacy POSTGRES_URI / DATABASE_URI values remain
# Alembic-only compatible. Every migration DSN must point
# (port 5432), never at a transaction-mode pooler (PgBouncer/RDS Proxy) —
# migrations run raw DDL. See docs/ops/database-connection-pooling.md.
migrations:
  hook:
    enabled: true
    backoffLimit: 2
    activeDeadlineSeconds: 1800
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    # -- Extra environment variables for the migration Job (e.g. a direct
    #    POSTGRES_URI when the app's DATABASE_URI points at a pooler)
    extraEnv: []
    # -- Dedicated secret values mounted only into the one-shot migration Job.
    #    Setting MIGRATION_DATABASE_URI activates the pinned River migration.
    secretData:
      MIGRATION_DATABASE_URI: ""
      POSTGRES_URI: ""
      CLICKHOUSE_URI: ""
    # -- Existing dedicated Secret when secrets.create=false. Falls back to
    #    secrets.externalSecretName for backward compatibility when empty.
    externalSecretName: ""

# =============================================================================
# CronJobs
# =============================================================================
cronjobs:
  dailyMetrics:
    enabled: true
    schedule: "0 2 * * *"
    command: ["dev-hops", "metrics", "daily"]
    activeDeadlineSeconds: 3600
    backoffLimit: 3
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  syncGithub:
    enabled: true
    schedule: "0 */6 * * *"
    command: ["dev-hops", "sync", "work-items", "--provider", "github", "--backfill", "1"]
    activeDeadlineSeconds: 7200
    backoffLimit: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  syncGitlab:
    enabled: false
    schedule: "30 */6 * * *"
    command: ["dev-hops", "sync", "work-items", "--provider", "gitlab", "--backfill", "1"]
    activeDeadlineSeconds: 7200
    backoffLimit: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  syncJira:
    enabled: false
    schedule: "0 */4 * * *"
    command: ["dev-hops", "sync", "work-items", "--provider", "jira", "--backfill", "1"]
    activeDeadlineSeconds: 3600
    backoffLimit: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: dev-health.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  #  - secretName: dev-health-tls
  #    hosts:
  #      - dev-health.example.com

# =============================================================================
# Network Policy
# =============================================================================
networkPolicy:
  enabled: false

# =============================================================================
# Configuration (non-secret)
# =============================================================================
config:
  # -- API
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  GRAPHQL_QUERY_TIMEOUT: "30"
  BATCH_SIZE: "100"
  MAX_WORKERS: "4"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "dev-health-ops"
  OTEL_METRIC_EXPORT_INTERVAL: "60000"
  # -- Go worker migration/database policy. Role names are non-secret; the
  #    elevated migration DSN lives only under migrations.hook.secretData.
  RIVER_DATABASE_SCHEMA: "river"
  RIVER_DOMAIN_DATABASE_ROLE: "devhealth_domain"
  RIVER_QUEUE_DATABASE_ROLE: "devhealth_queue"
  # -- Celery (auto-set if valkey.enabled, override for external broker)
  CELERY_BROKER_URL: ""
  CELERY_RESULT_BACKEND: ""
  PROVIDER_SYNC_QUEUES_ENABLED: "true"
  SYNC_COST_CLASS_QUEUES: "true"
  HIDE_MIGRATED_CHILD_CONFIGS: "true"
  SYNC_RUN_MAX_UNITS: "1000"
  SYNC_UNIT_CONCURRENCY_PER_BUCKET: "8"
  SYNC_UNIT_DISPATCH_STALE_SECONDS: "900"
  SYNC_UNIT_RUNNING_STALE_SECONDS: "3600"
  LINEAR_BACKFILL_MAX_WINDOW_DAYS: "14"
  SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES: "1"
  SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS: "60"
  SYNC_DISPATCH_REDISPATCH_COUNTDOWN: "60"
  SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS: "300"
  SYNC_WATERMARK_OVERLAP: "0"
  SYNC_BUDGET_BUCKET_LIMITS: '{"github:rest_core":250,"github:graphql_cost":500,"github:contents_blob":100,"github:secondary_abuse_risk":25,"linear:graphql_cost":500}'
  SYNC_BUDGET_DEFAULT_LIMIT: "1000000"
  SYNC_BUDGET_DEFERRAL_SECONDS: "60"
  SYNC_BUDGET_DEFERRAL_JITTER_SECONDS: "5"
  SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT: "1000000"
  SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS: "60"
  # -- Integration defaults
  GITLAB_URL: "https://gitlab.com"
  JIRA_FETCH_COMMENTS: "1"
  GITHUB_APP_ID: ""
  GITHUB_APP_PRIVATE_KEY_PATH: ""
  GITHUB_APP_INSTALLATION_ID: ""
  GITHUB_BASE_URL: "https://api.github.com"
  GITHUB_INCLUDE_PRS: "true"
  GITHUB_FETCH_COMMENTS: "true"
  GITHUB_FETCH_MILESTONES: "true"
  GITHUB_LINEAR_LINKBACK_BOTS: "linear[bot]"
  LINEAR_TRUSTED_SCM_HOSTS: ""

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # -- Create a Kubernetes Secret from these values. Set to false to use an
  #    existing secret (externalSecretName).
  create: true
  # -- Name of an existing Secret to use instead of creating one
  externalSecretName: ""
  # -- Secret values (plaintext — Helm encodes to base64)
  # MIGRATION_DATABASE_URI and MIGRATION_DATABASE_URI_FILE are rejected here;
  # use migrations.hook.secretData or migrations.hook.externalSecretName so
  # the elevated DSN reaches only the one-shot migration Job.
  data:
    DATABASE_URI: ""
    CLICKHOUSE_URI: ""
    REDIS_URL: ""
    JWT_SECRET_KEY: ""
    SETTINGS_ENCRYPTION_KEY: ""
    ADMIN_API_KEY: ""
    GITHUB_TOKEN: ""
    GITHUB_APP_PRIVATE_KEY: ""
    GITLAB_TOKEN: ""
    JIRA_BASE_URL: ""
    JIRA_EMAIL: ""
    JIRA_API_TOKEN: ""
    LINEAR_API_KEY: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_PUBLISHABLE_KEY: ""
    STRIPE_WEBHOOK_SECRET: ""
    EMAIL_PROVIDER: "console"
    SMTP_HOST: ""
    SMTP_PORT: ""
    EMAIL_API_KEY: ""
    SENTRY_DSN: ""
    LICENSE_PUBLIC_KEY: ""
    LICENSE_PRIVATE_KEY: ""

# =============================================================================
# In-cluster Valkey (optional — disable for managed Valkey/Redis)
# =============================================================================
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8-alpine"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  maxmemory: "256mb"

# =============================================================================
# In-cluster ClickHouse (optional — disable for managed ClickHouse)
# =============================================================================
clickhouse:
  enabled: true
  image:
    repository: clickhouse/clickhouse-server
    tag: "latest"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  credentials:
    user: "ch"
    password: "ch"
    database: "default"

# =============================================================================
# In-cluster PostgreSQL (optional — disable for managed Postgres)
# =============================================================================
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  credentials:
    user: "devhealth"
    password: "devhealth"
    database: "devhealth"
