---
# ConfigMap for dev-health-ops application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: dev-health-config
  namespace: dev-health
  labels:
    app.kubernetes.io/name: dev-health
    app.kubernetes.io/component: config
data:
  # Database configuration (connection strings in secrets)
  GRAPHQL_QUERY_TIMEOUT: "30"
  BATCH_SIZE: "100"
  MAX_WORKERS: "4"
  
  # API configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  
  # Celery configuration
  CELERY_BROKER_URL: "redis://valkey:6379/0"
  CELERY_RESULT_BACKEND: "redis://valkey:6379/0"
  WORKER_CONCURRENCY: "4"
  WORKER_HEAVY_CONCURRENCY: "2"
  RIVER_DATABASE_SCHEMA: "river"
  RIVER_DOMAIN_DATABASE_ROLE: "devhealth_domain"
  RIVER_QUEUE_DATABASE_ROLE: "devhealth_queue"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "dev-health-ops"
  OTEL_METRIC_EXPORT_INTERVAL: "60000"
  
  PROVIDER_SYNC_QUEUES_ENABLED: "true"
  SYNC_COST_CLASS_QUEUES: "true"
  HIDE_MIGRATED_CHILD_CONFIGS: "true"
  SYNC_RUN_MAX_UNITS: "1000"
  SYNC_UNIT_CONCURRENCY_PER_BUCKET: "8"
  SYNC_UNIT_DISPATCH_STALE_SECONDS: "900"
  SYNC_UNIT_RUNNING_STALE_SECONDS: "3600"
  LINEAR_BACKFILL_MAX_WINDOW_DAYS: "14"
  SYNC_UNIT_EXPIRED_LEASE_MAX_RETRIES: "1"
  SYNC_UNIT_EXPIRED_LEASE_RETRY_BACKOFF_SECONDS: "60"
  SYNC_DISPATCH_REDISPATCH_COUNTDOWN: "60"
  SYNC_OUTBOX_CLAIM_TIMEOUT_SECONDS: "300"
  SYNC_WATERMARK_OVERLAP: "0"

  SYNC_BUDGET_BUCKET_LIMITS: '{"github:rest_core":250,"github:graphql_cost":500,"github:contents_blob":100,"github:secondary_abuse_risk":25,"linear:graphql_cost":500}'
  SYNC_BUDGET_DEFAULT_LIMIT: "1000000"
  SYNC_BUDGET_DEFERRAL_SECONDS: "60"
  SYNC_BUDGET_DEFERRAL_JITTER_SECONDS: "5"
  SYNC_BUDGET_DRY_RUN_DEFAULT_LIMIT: "1000000"
  SYNC_BUDGET_DRY_RUN_DEFERRAL_SECONDS: "60"
  
  # GitLab configuration (for self-hosted)
  GITLAB_URL: "https://gitlab.com"
  
  # Jira configuration
  JIRA_FETCH_COMMENTS: "1"
  
  # GitHub configuration
  GITHUB_APP_ID: ""
  GITHUB_APP_PRIVATE_KEY_PATH: ""
  GITHUB_APP_INSTALLATION_ID: ""
  GITHUB_BASE_URL: "https://api.github.com"
  GITHUB_INCLUDE_PRS: "true"
  GITHUB_FETCH_COMMENTS: "true"
  GITHUB_FETCH_MILESTONES: "true"
  GITHUB_LINEAR_LINKBACK_BOTS: "linear[bot]"

  LINEAR_TRUSTED_SCM_HOSTS: ""
  
  # Logging
  LOG_LEVEL: "INFO"

  # Migrations (CHAOS-2304): schema is applied by the one-shot migrate Job
  # (migrate-job.yaml) — api/worker pods must never run migrations themselves.
  AUTO_RUN_MIGRATIONS: "false"
