name: Documentation inventory review

on:
  push:
    branches:
      - agent/docs-phase-1-inventory-disposition
    paths:
      - 'docs/**'
      - 'docs-prototype/**'
      - 'docs-qa/**'
      - '.github/documentation-program/**'
      - 'scripts/docs_inventory_v2.py'
      - 'scripts/docs_inventory_review.py'
      - 'scripts/write_reviewed_disposition.py'
      - 'scripts/.disposition-payload-*.b64'
      - 'mkdocs.yml'
      - 'mkdocs.prototype.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/**'
      - 'Makefile'
      - '*.md'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs-prototype/**'
      - 'docs-qa/**'
      - '.github/documentation-program/**'
      - 'scripts/docs_inventory_v2.py'
      - 'scripts/docs_inventory_review.py'
      - 'mkdocs.yml'
      - 'mkdocs.prototype.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/**'
      - 'Makefile'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install inventory dependency
        run: python -m pip install 'PyYAML>=6.0.3'

      - name: Generate complete factual inventory
        id: generate
        continue-on-error: true
        run: |
          mkdir -p .build
          set +e
          python scripts/docs_inventory_review.py \
            --repository full-chaos/dev-health-ops \
            --output .build/documentation-inventory.json \
            > .build/inventory-command.log 2>&1
          status=$?
          cat .build/inventory-command.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Create factual review formats
        if: steps.generate.outcome == 'success'
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          from collections import Counter
          from pathlib import Path

          build = Path('.build')
          inventory = json.loads((build / 'documentation-inventory.json').read_text())
          rows = inventory['rows']
          fields = [
              'source_repo', 'source_path', 'artifact_type',
              'publication_classification', 'current_url',
              'current_nav_location', 'content_type', 'primary_audience',
              'secondary_audiences', 'product_area', 'owner',
              'last_meaningful_review', 'generated', 'public_today',
              'duplicate_group', 'known_accuracy_risk',
              'known_usability_risk', 'build_dependencies', 'links_in',
              'links_out', 'notes',
          ]
          with (build / 'documentation-inventory.tsv').open(
              'w', encoding='utf-8', newline=''
          ) as handle:
              writer = csv.DictWriter(
                  handle, fieldnames=fields, delimiter='\t', lineterminator='\n'
              )
              writer.writeheader()
              for row in rows:
                  normalized = dict(row)
                  for key in (
                      'current_nav_location', 'secondary_audiences',
                      'build_dependencies', 'links_in', 'links_out',
                  ):
                      normalized[key] = ' | '.join(
                          str(value) for value in (normalized.get(key) or [])
                      )
                  writer.writerow({field: normalized.get(field) for field in fields})

          classifications = Counter(
              row['publication_classification'] for row in rows
          )
          artifact_types = Counter(row['artifact_type'] for row in rows)
          unclassified = [
              row for row in rows
              if row['publication_classification'] == 'unclassified'
          ]
          gaps = [
              row for row in rows
              if row['publication_classification'] == 'gap-unverified'
          ]
          public_pages = [
              row for row in rows
              if row.get('public_today') and row['artifact_type'] == 'markdown-page'
          ]
          lines = [
              '# Documentation inventory review summary',
              '',
              f"Generated from commit `{__import__('os').environ.get('GITHUB_SHA', 'unknown')}`.",
              '',
              f"- Inventory rows: **{len(rows)}**",
              f"- Current-site Markdown pages: **{artifact_types.get('markdown-page', 0)}**",
              f"- Prototype pages: **{artifact_types.get('prototype-page', 0)}**",
              f"- Pages treated as public today: **{len(public_pages)}**",
              f"- Unclassified pages: **{len(unclassified)}**",
              f"- Explicit external/runtime gaps: **{len(gaps)}**",
              '',
              '## Publication classifications',
              '',
          ]
          lines.extend(
              f'- `{name}`: {count}'
              for name, count in sorted(classifications.items())
          )
          lines.extend(['', '## Artifact types', ''])
          lines.extend(
              f'- `{name}`: {count}'
              for name, count in sorted(artifact_types.items())
          )
          lines.extend(['', '## Explicit gaps', ''])
          lines.extend(
              f"- `{row['source_path']}` — {row.get('notes') or ''}"
              for row in gaps
          )
          (build / 'documentation-inventory-summary.md').write_text(
              '\n'.join(lines) + '\n', encoding='utf-8'
          )
          PY

      - name: Expand reviewed disposition
        if: steps.generate.outcome == 'success' && hashFiles('scripts/write_reviewed_disposition.py') != ''
        run: |
          python scripts/write_reviewed_disposition.py \
            --output-dir .github/documentation-program/inventory

      - name: Copy factual inventory snapshot
        if: steps.generate.outcome == 'success'
        run: |
          mkdir -p .github/documentation-program/inventory
          cp .build/documentation-inventory.json \
            .github/documentation-program/inventory/documentation-inventory.json
          cp .build/documentation-inventory.tsv \
            .github/documentation-program/inventory/documentation-inventory.tsv
          cp .build/documentation-inventory-summary.md \
            .github/documentation-program/inventory/generated-summary.md

      - name: Validate committed disposition
        if: steps.generate.outcome == 'success'
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          from pathlib import Path

          inventory_dir = Path('.github/documentation-program/inventory')
          disposition = inventory_dir / 'disposition-matrix.tsv'
          if not disposition.exists():
              raise SystemExit('Missing reviewed disposition-matrix.tsv')

          approved_urls = set()
          for path in sorted(Path('.github/documentation-program/ia').glob('*.tsv')):
              with path.open(encoding='utf-8', newline='') as handle:
                  approved_urls.update(
                      row['url'].strip()
                      for row in csv.DictReader(handle, delimiter='\t')
                      if row.get('url', '').strip()
                  )

          with disposition.open(encoding='utf-8', newline='') as handle:
              rows = list(csv.DictReader(handle, delimiter='\t'))
          if len(rows) != 448:
              raise SystemExit(f'Expected 448 disposition rows, found {len(rows)}')

          required = {
              'proposed_disposition', 'target_section', 'target_page_type',
              'canonical_owner', 'source_of_truth', 'migration_phase',
              'reason', 'reviewer',
          }
          explicit_nonpublic = {
              'archive', 'internal-only', 'internal-source-evidence',
              'remove', 'remove-or-replace', 'retain-internal',
              'archive-or-recapture',
          }
          errors = []
          for row in rows:
              key = f"{row['source_repo']}:{row['source_path']}"
              for field in required:
                  if not row.get(field, '').strip():
                      errors.append(f'{key} missing {field}')
              target_url = row.get('target_url', '').strip()
              if target_url and target_url not in approved_urls:
                  errors.append(f'{key} targets non-IA URL {target_url}')
              if (
                  row.get('publication_classification') in {'public-nav', 'public-reference'}
                  and not target_url
                  and row.get('proposed_disposition') not in explicit_nonpublic
              ):
                  errors.append(f'{key} lacks target or non-public disposition')
          if errors:
              raise SystemExit('\n'.join(errors[:50]))
          print('Validated 448 reviewed disposition rows against the locked IA')
          PY

      - name: Commit expanded review files
        if: github.event_name == 'push' && hashFiles('scripts/write_reviewed_disposition.py') != ''
        run: |
          rm -f scripts/write_reviewed_disposition.py
          rm -f scripts/.disposition-payload-*.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/documentation-program/inventory scripts
          git commit -m 'docs: commit the reviewed inventory and disposition matrix'
          git push

      - name: Upload inventory review artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-inventory-review
          path: |
            .build/**
            .github/documentation-program/inventory/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      - name: Fail when generation failed
        if: steps.generate.outcome != 'success'
        run: exit 1
